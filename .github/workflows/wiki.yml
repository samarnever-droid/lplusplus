name: Publish L++ Wiki

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'wiki/**'
      - 'scripts/check_wiki.py'
      - 'scripts/publish_wiki.sh'
      - '.github/workflows/wiki.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate version-controlled wiki
        run: python3 scripts/check_wiki.py

  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Publish to GitHub Wiki
        env:
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
        run: sh scripts/publish_wiki.sh
