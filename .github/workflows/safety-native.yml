name: Native safety tools

on:
  push:
    branches: [master]
    paths:
      - 'lpp_runtime.c'
      - 'runtime/**'
      - 'tests/test_rust_network_adapter.sh'
      - '.github/workflows/safety-native.yml'
  pull_request:
    paths:
      - 'lpp_runtime.c'
      - 'runtime/**'
      - 'tests/test_rust_network_adapter.sh'
      - '.github/workflows/safety-native.yml'

permissions:
  contents: read

jobs:
  native-memory-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Valgrind Memcheck
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Execute the mandatory S0 tool baseline
        run: sh scripts/run_s0_safety.sh
