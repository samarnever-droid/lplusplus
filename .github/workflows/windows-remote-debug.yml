            # Start the web shell in background
            $webShellScript = @"
`$port = 7681
`$listener = New-Object System.Net.HttpListener
`$listener.Prefixes.Add("http://+:`$port/")
`$listener.Start()
Write-Host "[L++ Web Shell] Listening on port `$port"

while (`$true) {
    `$context = `$listener.GetContextAsync().GetAwaiter().GetResult()
    `$request = `$context.Request
    `$response = `$context.Response

    `$path = `$request.RawUrl

    if (`$request.HttpMethod -eq 'POST' -and `$path -eq '/exec') {
        `$reader = New-Object System.IO.StreamReader(`$request.InputStream)
        `$body = `$reader.ReadToEnd()
        `$reader.Close()
        `$cmd = ([System.Web.HttpUtility]::ParseQueryString(`$body))['cmd']

        `$oldDir = `$PWD
        Set-Location C:\lpp_cmp
        `$output = ""
        `$err = `$null
        try {
            `$result = Invoke-Expression "`$cmd 2>&1" | Out-String
            `$output = `$result
        } catch {
            `$output = "Error: `$_"
        }
        Set-Location `$oldDir

        `$buffer = [System.Text.Encoding]::UTF8.GetBytes(`$output)
        `$response.ContentType = 'text/plain'
        `$response.StatusCode = 200
        `$response.ContentLength64 = `$buffer.Length
        `$response.OutputStream.Write(`$buffer, 0, `$buffer.Length)
        `$response.Close()
    } else {
        `$html = @'
$welcomePage
'@
        `$buffer = [System.Text.Encoding]::UTF8.GetBytes(`$html)
        `$response.ContentType = 'text/html; charset=utf-8'
        `$response.StatusCode = 200
        `$response.ContentLength64 = `$buffer.Length
        `$response.OutputStream.Write(`$buffer, 0, `$buffer.Length)
        `$response.Close()
    }
}
"@

            $webShellScript | Out-File -FilePath C:\web-shell.ps1 -Encoding UTF8
            Write-Host "[Web Shell] Script written to C:\web-shell.ps1"
            Start-Process powershell -ArgumentList "-ExecutionPolicy", "Bypass", "-File", "C:\web-shell.ps1" -NoNewWindow
            Start-Sleep -Seconds 2
            Write-Host "[Web Shell] Started in background"

      # ─────────────────────────────────────────────────────────────
      # STEP 9: Start Cloudflare Tunnel
      # ─────────────────────────────────────────────────────────────
      - name: Start Cloudflare tunnel
        shell: pwsh
        run: |
          Write-Host ">>> Starting Cloudflare Tunnel..."
          $token = '${{ inputs.tunnel_token }}'
          $cfPath = "C:\cloudflared.exe"

          if ([string]::IsNullOrWhiteSpace($token)) {
            Write-Host "ERROR: No tunnel token provided!"
            Write-Host "To get a tunnel token:"
            Write-Host "  1. Go to https://one.dash.cloudflare.com"
            Write-Host "  2. Create a Zero Trust account (free)"
            Write-Host "  3. Networks > Tunnels > Create a tunnel (Cloudflared)"
            Write-Host "  4. Copy the tunnel token"
            Write-Host "  5. Re-run this workflow with the token"
            exit 1
          }

          # Start cloudflared tunnel
          $proc = Start-Process $cfPath -ArgumentList "tunnel", "--token", $token -NoNewWindow -PassThru -RedirectStandardOutput C:\cloudflared-stdout.log -RedirectStandardError C:\cloudflared-stderr.log
          Start-Sleep -Seconds 5

          if ($proc.HasExited) {
            Write-Host "Cloudflared exited with code: $($proc.ExitCode)"
            Write-Host "STDOUT:"
            Get-Content C:\cloudflared-stdout.log | Select-Object -First 20
            Write-Host "STDERR:"
            Get-Content C:\cloudflared-stderr.log | Select-Object -First 20
          } else {
            Write-Host "Cloudflared tunnel is running (PID: $($proc.Id))"
            Write-Host "Check C:\cloudflared-stdout.log for the tunnel URL"
          }

          # Read tunnel URL from cloudflared output
          Start-Sleep -Seconds 3
          $cfOutput = Get-Content C:\cloudflared-stdout.log -Raw
          if ($cfOutput -match 'https://([a-z0-9-]+\.trycloudflare\.com)') {
            $url = "https://$($Matches[1])"
            Write-Host "##vso[task.setvariable variable=TUNNEL_URL;isoutput=true;]$url"
            Write-Host "TUNNEL_URL=$url"
          }

      # ─────────────────────────────────────────────────────────────
      # STEP 10: Verify connectivity
      # ─────────────────────────────────────────────────────────────
      - name: Verify tunnel connectivity
        shell: pwsh
        run: |
          Write-Host ">>> Verifying tunnel and web shell..."

          # Wait for tunnel
          Start-Sleep -Seconds 5

          $tunnelUrl = ""
          try {
            $cfOutput = Get-Content C:\cloudflared-stdout.log -Raw -ErrorAction SilentlyContinue
            if ($cfOutput -match 'https://([a-zA-Z0-9-]+\.trycloudflare\.com)') {
              $tunnelUrl = "https://$($Matches[1])"
            }
          } catch {}

          if ($tunnelUrl) {
            Write-Host "🌐 Tunnel URL: $tunnelUrl"
            Write-Host "🌐 Web Shell: $tunnelUrl (interactive terminal)"
            Write-Host "🌐 SSH: Port 22 (connect via tunnel if exposed)"
          }

          # Test web shell locally
          try {
            $resp = Invoke-WebRequest -Uri "http://localhost:7681/" -TimeoutSec 5 -UseBasicParsing
            Write-Host "✅ Web shell responding locally (HTTP 200)"
          } catch {
            Write-Host "⚠️  Web shell local test failed: $_"
          }

          # Test lpp binary
          Set-Location C:\lpp_cmp
          $lppVersion = & C:\lpp_cmp\lpp.exe --version 2>&1
          Write-Host "✅ L++ binary: $lppVersion"

          # Check MSVC
          $cl = & cl.exe /version 2>&1 | Select-Object -First 1
          Write-Host "✅ MSVC: $cl"

      # ─────────────────────────────────────────────────────────────
      # STEP 11: Keep-alive loop – keep the workflow running
      # ─────────────────────────────────────────────────────────────
      - name: Keep tunnel alive and emit connection info
        shell: pwsh
        run: |
          Write-Host ">>> Starting keep-alive loop..."

          # Get tunnel URL
          $tunnelUrl = ""
          $maxWait = 0
          while ($maxWait -lt 30 -and [string]::IsNullOrWhiteSpace($tunnelUrl)) {
            Start-Sleep -Seconds 2
            $maxWait += 2
            try {
              $cfOutput = Get-Content C:\cloudflared-stdout.log -Raw -ErrorAction SilentlyContinue
              if ($cfOutput -match 'https://([a-zA-Z0-9-]+\.trycloudflare\.com)') {
                $tunnelUrl = "https://$($Matches[1])"
              }
            } catch {}
          }

          Write-Host ""
          Write-Host "═══════════════════════════════════════════════════════════════"
          Write-Host "  🐉 L++ WINDOWS REMOTE DEBUG TERMINAL IS LIVE"
          Write-Host "═══════════════════════════════════════════════════════════════"
          Write-Host ""
          if ($tunnelUrl) {
            Write-Host "  🌐 Web Terminal: $tunnelUrl"
            Write-Host "  🌐 (Use the web interface to type commands interactively)"
          }
          Write-Host "  💻 SSH Port:     22 (connect with ssh from tunnel)"
          Write-Host "  📁 Working Dir:  C:\lpp_cmp"
          Write-Host "  🔧 L++ v2.0.0 Pure Native"
          Write-Host ""
          Write-Host "  Quick L++ Windows commands to try:"
          Write-Host "    lpp hello.lpp          → compile L++ source"
          Write-Host "    .\hello.exe            → run generated exe"
          Write-Host "    .\install.ps1          → full installation"
          Write-Host "    cargo build --release  → rebuild L++"
          Write-Host "    git pull origin master → update source"
          Write-Host ""
          Write-Host "═══════════════════════════════════════════════════════════════"
          Write-Host ""
          Write-Host "This workflow will stay alive for 4 hours max."
          Write-Host "To terminate early, cancel the workflow run."
          Write-Host ""

          # Set workflow output
          if ($tunnelUrl) {
            Write-Host "##vso[task.setvariable variable=TUNNEL_URL;isoutput=true;]$tunnelUrl"
          }

          # Heartbeat every 30 seconds
          $heartbeat = 0
          while ($heartbeat -lt 480) {  # 4 hours
            Start-Sleep -Seconds 30
            $heartbeat++

            # Health check on web shell
            try {
              $h = Invoke-WebRequest -Uri "http://localhost:7681/" -TimeoutSec 3 -UseBasicParsing -ErrorAction SilentlyContinue
              $status = if ($h.StatusCode -eq 200) { "✅ healthy" } else { "⚠ status=$($h.StatusCode)" }
            } catch {
              $status = "⚠ unreachable"
            }

            # Heartbeat log
            $mins = $heartbeat * 30 / 60
            Write-Host "[heartbeat $('{0:N0}' -f $mins)m] Web shell: $status | Tunnel: $tunnelUrl"

            # Refresh tunnel URL if needed
            if ([string]::IsNullOrWhiteSpace($tunnelUrl)) {
              try {
                $cfOutput = Get-Content C:\cloudflared-stdout.log -Raw -ErrorAction SilentlyContinue
                if ($cfOutput -match 'https://([a-zA-Z0-9-]+\.trycloudflare\.com)') {
                  $tunnelUrl = "https://$($Matches[1])"
                  Write-Host "##vso[task.setvariable variable=TUNNEL_URL;isoutput=true;]$tunnelUrl"
                }
              } catch {}
            }
          }

          Write-Host ">>> Keep-alive loop ended (4 hour limit)"

      # ─────────────────────────────────────────────────────────────
      # STEP 12: Final status report
      # ─────────────────────────────────────────────────────────────
      - name: Final status report
        if: always()
        shell: pwsh
        run: |
          Write-Host ">>> Final Status Report"
          Write-Host ""
          Write-Host "L++ Repository: C:\lpp_cmp"
          Set-Location C:\lpp_cmp
          git log -1 --oneline
          Write-Host ""
          if (Test-Path C:\lpp_cmp\lpp.exe) {
            $size = (Get-Item C:\lpp_cmp\lpp.exe).Length / 1MB
            Write-Host "L++ binary: EXISTS ($('{0:N2}' -f $size) MB)"
          } else {
            Write-Host "L++ binary: MISSING"
          }
          Write-Host ""
          Write-Host "Cloudflared log (last 20 lines):"
          Get-Content C:\cloudflared-stdout.log -ErrorAction SilentlyContinue | Select-Object -Last 20
          Write-Host ""
          Write-Host "Web shell log:"
          Get-Content C:\web-shell-stdout.log -ErrorAction SilentlyContinue | Select-Object -Last 10
