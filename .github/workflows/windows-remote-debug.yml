name: Windows Remote Debug Terminal

on:
  workflow_dispatch:

jobs:
  windows-remote-terminal:
    name: Remote Windows Debug Terminal
    runs-on: windows-latest
    timeout-minutes: 240

    steps:
      - name: Clone L++ repository
        shell: pwsh
        run: |
          if (Test-Path C:\lpp_cmp) {
            Set-Location C:\lpp_cmp
            git fetch origin master
            git checkout master
            git pull origin master
          } else {
            git clone https://github.com/samarnever-droid/lplusplus.git C:\lpp_cmp
            Set-Location C:\lpp_cmp
          }
          git log -1 --oneline

      - name: Check pre-built lpp.exe
        shell: pwsh
        run: |
          Set-Location C:\lpp_cmp
          # Check if we have a pre-built lpp.exe from release
          if (Test-Path C:\lpp_cmp\lpp.exe) {
            $v = & C:\lpp_cmp\lpp.exe --version 2>&1
            Write-Host "Pre-built lpp.exe found: $v"
          } else {
            Write-Host "No pre-built lpp.exe found"
          }
          # Always check git HEAD
          Write-Host "L++ HEAD: $(git log -1 --oneline)"

      - name: Write web shell script
        shell: pwsh
        run: |
          $lines = @()
          $lines += 'param([int]$port = 7681)'
          $lines += '$l = New-Object System.Net.HttpListener'
          $lines += '$l.Prefixes.Add("http://+:$port/")'
          $lines += '$l.Start()'
          $lines += 'Write-Host ("Listening on port $port")'
          $lines += '$hn = $env:COMPUTERNAME'
          $lines += '$wu = whoami'
          $lines += 'Set-Location C:\lpp_cmp'
          $lines += '$gi = git log -1 --format="%h - %s" 2>&1'
          $lines += 'while ($true) {'
          $lines += '  $c = $l.GetContextAsync().GetAwaiter().GetResult()'
          $lines += '  $r = $c.Request'
          $lines += '  $s = $c.Response'
          $lines += '  if ($r.HttpMethod -eq "POST" -and $r.RawUrl -eq "/exec") {'
          $lines += '    $rd = New-Object System.IO.StreamReader($r.InputStream)'
          $lines += '    $bd = $rd.ReadToEnd(); $rd.Close()'
          $lines += '    $cs = ([System.Web.HttpUtility]::ParseQueryString($bd))["cmd"]'
          $lines += '    $od = $PWD'
          $lines += '    Set-Location C:\lpp_cmp'
          $lines += '    try { $ou = Invoke-Expression "$cs 2>&1" | Out-String -Width 10000 } catch { $ou = "Error: $_" }'
          $lines += '    Set-Location $od'
          $lines += '    $bu = [System.Text.Encoding]::UTF8.GetBytes($ou)'
          $lines += '    $s.ContentType = "text/plain"; $s.StatusCode = 200'
          $lines += '    $s.ContentLength64 = $bu.Length'
          $lines += '    $s.OutputStream.Write($bu, 0, $bu.Length); $s.Close()'
          $lines += '  } else {'
          $lines += '    $h = "<!DOCTYPE html><html><head><meta charset=utf-8><title>L++ Debug</title>"
          $lines += '    $h += "<style>'
          $lines += '    *{box-sizing:border-box;margin:0;padding:0}'
          $lines += '    body{background:#0f0f17;color:#c5cce8;font-family:Cascadia,Consolas,monospace;height:100vh;display:flex;flex-direction:column;font-size:14px}'
          $lines += '    #b{background:linear-gradient(90deg,#7c3aed,#2563eb);color:white;padding:10px 24px;font-size:15px;font-weight:bold;text-align:center}'
          $lines += '    #h{background:#1a1a2e;padding:12px 24px;border-bottom:2px solid #7c3aed;display:flex;gap:12px;align-items:center}'
          $lines += '    #h h1{font-size:16px;color:#a78bfa}'
          $lines += '    .s{background:#1a1a2e;border-radius:6px;padding:12px 16px;margin:4px 0;border-left:3px solid #7c3aed;font-size:13px}'
          $lines += '    .t{color:#a78bfa;font-weight:bold}'
          $lines += '    .k{color:#67e8f9}'
          $lines += '    .d{color:#9ca3af}'
          $lines += '    #t{flex:1;overflow-y:auto;padding:16px 24px}'
          $lines += '    .ln{white-space:pre-wrap;word-break:break-all;line-height:1.7}'
          $lines += '    #in{background:#1a1a2e;padding:12px 24px;border-top:1px solid #2d2d44;display:flex;gap:8px;align-items:center}'
          $lines += '    #pr{color:#a78bfa}'
          $lines += '    #i{flex:1;background:#11111f;color:#e2e8f0;border:1px solid #3d3d5c;border-radius:6px;padding:8px 12px;font-family:inherit;font-size:14px;outline:none}'
          $lines += '    #i:focus{border-color:#7c3aed}'
          $lines += '    #b2{background:#7c3aed;color:white;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-weight:bold;font-family:inherit}'
          $lines += '    #s2{background:#0a0a14;padding:4px 24px;font-size:11px;color:#4b5563}'
          $lines += '    </style></head><body>"'
          $lines += '    $h += "<div id=b>L++ Remote Debug Terminal -- Live Windows Shell</div>"'
          $lines += '    $h += "<div id=h><h1>Terminal</h1><span style=background:#7c3aed;color:white;padding:2px 8px;border-radius:10px;font-size:12px>v2.0.0</span>"'
          $lines += '    $h += "<span style=margin-left:auto;font-size:12px;color:#6b7280>HOST: $hn | USER: $wu | C:\lpp_cmp</span></div>"'
          $lines += '    $h += "<div id=t>'
          $lines += '    $h += "<div class=s><span class=t>Connected</span><br><span class=k>Git:</span> <span class=d>$gi</span><br><span class=k>Binary:</span> <span class=d>C:\lpp_cmp\lpp.exe</span></div>"'
          $lines += '    $h += "<div class=s><span class=t>L++ v2.0.0 Pure Native Pipeline</span><br>"'
          $lines += '    $h += "The L++ compiler uses Cranelift AOT to emit native PE .exe files.<br>"'
          $lines += '    $h += "No C transpilation or MSVC compilation needed at build time.</div>"'
          $lines += '    $h += "<div class=s><span class=t>Quick Commands</span><br>"'
          $lines += '    $h += "<span class=k>lpp hello.lpp</span> <span class=d>- Compile L++ source to native .exe</span><br>"'
          $lines += '    $h += "<span class=k>.\hello.exe</span> <span class=d>- Run generated native exe</span><br>"'
          $lines += '    $h += "<span class=k>lpp hello.lpp --run</span> <span class=d>- Compile and run in one step</span><br>"'
          $lines += '    $h += "<span class=k>git pull origin master</span> <span class=d>- Update to latest code</span><br>"'
          $lines += '    $h += "<span class=k>git status && git log --oneline -5</span> <span class=d>- Check git state</span><br>"'
          $lines += '    $h += "<span class=k>Format-Hex .\hello.exe -Count 512</span> <span class=d>- Inspect PE headers (MZ, PE, sections)</span><br>"'
          $lines += '    $h += "<span class=k>git add . && git commit -m \"fix\" && git push</span> <span class=d>- Push fixes to GitHub</span></div>"'
          $lines += '    $h += "</div>"'
          $lines += '    $h += "<div id=in><span id=pr>PS C:\lpp_cmp&gt;&nbsp;</span><input id=i placeholder="Type a command..." autocomplete=off autofocus /><button id=b2 onclick=sc()>Run</button></div>"'
          $lines += '    $h += "<div id=s2><span style=color:#34d399>*</span> Shell active | L++ v2.0.0 Pure Native | Cloudflare Tunnel</div>"'
          $lines += '    $h += "<script>const i=document.getElementById(`"i`"),t=document.getElementById(`"t`");'
          $lines += 'i.addEventListener(`"keydown`",e=>{if(e.key==`"Enter`")sc()});'
          $lines += 'async function sc(){const c=i.value.trim();if(!c)return;i.value=`"`";'
          $lines += 'const el=document.createElement(`"div`");el.className=`"ln`";el.style.color=`"#a78bfa`";'
          $lines += 'el.textContent=`"PS C:\\lpp_cmp> `"+c;t.appendChild(el);'
          $lines += 'try{const r=await fetch(`"/exec`",{method:`"POST`",body:new URLSearchParams({cmd:c})});'
          $lines += 'const tx=await r.text();const o=document.createElement(`"div`");'
          $lines += 'o.className=`"ln`";o.style.color=r.ok?`"#c5cce8`":`"#f87171`";o.textContent=tx||`"(empty)`";t.appendChild(o)}'
          $lines += 'catch(e){const o=document.createElement(`"div`");o.className=`"ln`";o.style.color=`"#f87171`";o.textContent=`"Error: `"+e.message;t.appendChild(o)}'
          $lines += 't.scrollTop=t.scrollHeight;i.focus()};i.focus()</script></body></html>"'
          $lines += '    $bu = [System.Text.Encoding]::UTF8.GetBytes($h)'
          $lines += '    $s.ContentType = "text/html; charset=utf-8"; $s.StatusCode = 200'
          $lines += '    $s.ContentLength64 = $bu.Length'
          $lines += '    $s.OutputStream.Write($bu, 0, $bu.Length); $s.Close()'
          $lines += '  }'
          $lines += '}'
          $lines += ''
          $lines | Out-File -FilePath C:\web-shell.ps1 -Encoding UTF8
          Write-Host "Script written: C:\web-shell.ps1 ($($lines.Count) lines)"

      - name: Start web shell
        shell: pwsh
        run: |
          Start-Process powershell -ArgumentList "-ExecutionPolicy","Bypass","-File","C:\web-shell.ps1" -WindowStyle Hidden
          Start-Sleep -Seconds 3
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:7681/" -TimeoutSec 5 -UseBasicParsing
            Write-Host "Web shell OK: HTTP $($r.StatusCode)"
          } catch {
            Write-Host "Web shell check: $($_.Exception.Message)"
          }

      - name: Download cloudflared
        shell: pwsh
        run: |
          if (-not (Test-Path C:\cloudflared.exe)) {
            Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile C:\cloudflared.exe
          }
          & C:\cloudflared.exe --version

      - name: Start Cloudflare quick tunnel
        shell: pwsh
        run: |
          $proc = Start-Process C:\cloudflared.exe -ArgumentList "tunnel","--url","http://localhost:7681" -NoNewWindow -PassThru -RedirectStandardOutput C:\cflog.txt -RedirectStandardError C:\cferr.txt
          Write-Host "cloudflared PID: $($proc.Id)"
          Start-Sleep -Seconds 12
          $url = ""
          $try = 0
          while ($try -lt 10 -and [string]::IsNullOrWhiteSpace($url)) {
            Start-Sleep -Seconds 2
            $log = Get-Content C:\cflog.txt -Raw -ErrorAction SilentlyContinue
            if ($log -match "https://[a-z0-9-]+\.trycloudflare\.com") { $url = $Matches[0] }
            $try += 2
          }
          if ($url) {
            Write-Host ""
            Write-Host "======================================================================"
            Write-Host "  LIVE: $url"
            Write-Host "======================================================================"
            Write-Host "  Open this URL in your browser for a live Windows PowerShell shell"
            Write-Host "  Try: lpp hello.lpp && .\hello.exe"
            Write-Host "======================================================================"
            Write-Host "##vso[task.setvariable variable=TUNNEL_URL;isoutput=true]$url"
          } else {
            Write-Host "No tunnel URL found"
            Get-Content C:\cflog.txt | Select-Object -First 15
          }

      - name: Verify setup
        shell: pwsh
        run: |
          Set-Location C:\lpp_cmp
          $v = & C:\lpp_cmp\lpp.exe --version 2>&1
          Write-Host "L++: $v"
          Write-Host "Git: $(git log -1 --oneline)"
          $log = Get-Content C:\cflog.txt -Raw -ErrorAction SilentlyContinue
          if ($log -match "https://[a-z0-9-]+\.trycloudflare\.com") {
            Write-Host "Tunnel: $($Matches[0])"
          }

      - name: Keep tunnel alive
        shell: pwsh
        run: |
          $url = ""
          $log = Get-Content C:\cflog.txt -Raw -ErrorAction SilentlyContinue
          if ($log -match "https://[a-z0-9-]+\.trycloudflare\.com") { $url = $Matches[0] }
          Write-Host ""
          Write-Host "======================================================================"
          Write-Host "  OPEN IN BROWSER: $url"
          Write-Host "======================================================================"
          Write-Host "  L++ v2.0.0 Pure Native Pipeline - no cl.exe needed!"
          Write-Host ""
          Write-Host "  TEST: lpp hello.lpp && .\hello.exe"
          Write-Host "  FIX:  notepad C:\lpp_cmp\src\pm.rs"
          Write-Host "  PUSH: git add . && git commit -m 'fix' && git push origin master"
          Write-Host ""
          Write-Host "  Cancel workflow to shut down the terminal"
          Write-Host "======================================================================"
          Write-Host ""
          $i = 0
          while ($i -lt 480) {
            Start-Sleep -Seconds 30
            $i++
            $m = [math]::Round($i * 0.5)
            $h = "DOWN"
            try { $r = Invoke-WebRequest -Uri "http://localhost:7681/" -TimeoutSec 3 -UseBasicParsing -ErrorAction SilentlyContinue; $h = if ($r.StatusCode -eq 200) { "OK" } else { "HTTP $($r.StatusCode)" } } catch {}
            Write-Host "[$('{0:D2}' -f $m)m] shell=$h url=$url"
          }

      - name: Final report
        if: always()
        shell: pwsh
        run: |
          Set-Location C:\lpp_cmp
          Write-Host "L++ HEAD: $(git log -1 --oneline)"
          if (Test-Path C:\lpp_cmp\lpp.exe) { $mb = [math]::Round((Get-Item C:\lpp_cmp\lpp.exe).Length / 1MB, 2); Write-Host "Binary: $mb MB" }
          Get-Content C:\cflog.txt -ErrorAction SilentlyContinue | Select-Object -Last 5
