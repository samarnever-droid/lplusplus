            $listener = New-Object System.Net.HttpListener
            $listener.Prefixes.Add("http://+:$port/")
            $listener.Start()
            Write-Host "[L++ Remote Shell] Listening on port $port"
            Write-Host "[L++ Remote Shell] Connect via Cloudflare tunnel URL"

            $welcomePage = @"
