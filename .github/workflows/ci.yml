name: L++ CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  ownership-and-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          cc --version
      - name: Rust unit tests
        run: cargo test --locked
      - name: Strict runtime C compilation
        run: cc -std=c11 -Wall -Wextra -Werror -c lpp_runtime.c -o /tmp/lpp_runtime.o -pthread
      - name: C / Cranelift AOT parity suite
        run: sh tests/run_aot_parity.sh
      - name: Packaged runtime object linking
        run: sh tests/test_packaged_runtime.sh
      - name: Direct ELF linker MVP
        run: sh tests/test_lpp_link_elf.sh

  king20-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run King 20 Stable v1
        run: python3 benchmarks/king20/run.py --suite stable
      - name: Run King 20 Experimental
        run: python3 benchmarks/king20/run.py --suite experimental
      - name: Run King 20 direct ELF subset
        run: python3 benchmarks/king20/run_direct_elf.py
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: king20-results
          path: |
            benchmarks/king20/stable/v1/latest.json
            benchmarks/king20/stable/v1/latest.md
            benchmarks/king20/experimental/latest.json
            benchmarks/king20/experimental/latest.md
            benchmarks/king20/direct_elf_latest.json
            benchmarks/king20/direct_elf_latest.md

  scalability-phase-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run 10k / 50k / 100k phase scaling suite
        run: python3 benchmarks/scalability/run.py
      - name: Upload scalability result
        uses: actions/upload-artifact@v4
        with:
          name: scalability-results
          path: |
            benchmarks/scalability/latest.json
            benchmarks/scalability/latest.md
