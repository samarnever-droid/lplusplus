name: L++ CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ownership-and-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          cc --version
      - name: Install mold linker
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq mold 2>/dev/null || echo "mold not available, continuing without it"
      - name: Rust unit tests
        run: cargo test --locked
      - name: Strict runtime C compilation
        run: cc -std=c11 -Wall -Wextra -Werror -c lpp_runtime.c -o /tmp/lpp_runtime.o -pthread
      - name: C / Cranelift AOT parity suite
        run: sh tests/run_aot_parity.sh
      - name: Packaged runtime object linking
        run: sh tests/test_packaged_runtime.sh
      - name: Direct ELF linker MVP
        run: sh tests/test_lpp_link_elf.sh
      - name: Direct ELF linker negative cases
        run: sh tests/test_lpp_link_negative.sh
      - name: Installed direct-link build
        run: sh tests/test_direct_installed_build.sh
      - name: Source command split
        run: sh tests/test_source_commands.sh

  king20-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold 2>/dev/null || true
      - name: Run King 20 Stable v1
        run: python3 benchmarks/king20/run.py --suite stable
      - name: Run King 20 Experimental
        run: python3 benchmarks/king20/run.py --suite experimental
      - name: Run King 20 direct ELF
        run: python3 benchmarks/king20/run_direct_elf.py
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: king20-results
          path: |
            benchmarks/king20/stable/v1/latest.json
            benchmarks/king20/stable/v1/latest.md
            benchmarks/king20/experimental/latest.json
            benchmarks/king20/experimental/latest.md
            benchmarks/king20/direct_elf_latest.json
            benchmarks/king20/direct_elf_latest.md

  scalability-phase-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold 2>/dev/null || true
      - name: Run 10k / 50k / 100k phase scaling suite
        run: python3 benchmarks/scalability/run.py
      - name: Upload scalability result
        uses: actions/upload-artifact@v4
        with:
          name: scalability-results
          path: |
            benchmarks/scalability/latest.json
            benchmarks/scalability/latest.md

  windows-coff-fallback:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Locate and load MSVC tools
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vs) { throw "Visual Studio C++ tools were not found" }
          "VSCMD_BAT=$vs\VC\Auxiliary\Build\vcvars64.bat" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Build and unit-test Windows toolchain
        shell: pwsh
        run: |
          rustc --version
          cargo test --locked
          cargo build --release --bin lpp --bin lpp-link
      - name: Compile runtime object and link Cranelift COFF output
        shell: pwsh
        run: |
          $work = Join-Path $env:RUNNER_TEMP "lpp-windows-coff"
          New-Item -ItemType Directory -Force $work | Out-Null
          Copy-Item tests\arith.lpp "$work\arith.lpp"
          $cmd = Join-Path $work "build.cmd"
          @"
          @echo off
          call "%VSCMD_BAT%" >nul || exit /b 1
          cl.exe /nologo /O2 /c lpp_runtime.c "/Fo:$work\lpp_runtime.obj" || exit /b 1
          set LPP_AOT=1
          target\release\lpp.exe "$work\arith.lpp" || exit /b 1
          target\release\lpp-link.exe inspect "$work\arith.obj" > "$work\inspect.txt" || exit /b 1
          cl.exe /nologo "$work\arith.obj" "$work\lpp_runtime.obj" "/Fe:$work\arith.exe" || exit /b 1
          "$work\arith.exe" > "$work\output.txt" || exit /b 1
          exit /b 0
          "@ | Set-Content -Path $cmd -Encoding ascii
          cmd.exe /d /c $cmd
          if ($LASTEXITCODE -ne 0) { throw "MSVC COFF fallback build failed" }
          $inspect = Get-Content "$work\inspect.txt" -Raw
          if ($inspect -notmatch "format: Coff") { throw "Expected COFF inspection output" }
          if ($inspect -notmatch "architecture: X86_64") { throw "Expected x86-64 COFF object" }
          if ($inspect -notmatch "relocation-kinds:") { throw "Expected COFF relocation classification" }
          $actual = (Get-Content "$work\output.txt" | ForEach-Object { $_.Trim() }) -join "`n"
          if ($actual -ne "15`n5`n50`n2") { throw "Unexpected Windows AOT output: $actual" }
      - name: Direct PE Kernel32 runtime MVP
        shell: pwsh
        run: |
          $work = Join-Path $env:RUNNER_TEMP "lpp-windows-pe"
          New-Item -ItemType Directory -Force $work | Out-Null
          @"
          def main():
              print(7)
          "@ | Set-Content -Path "$work\direct.lpp" -Encoding ascii
          $cmd = Join-Path $work "direct.cmd"
          @"
          @echo off
          call "%VSCMD_BAT%" >nul || exit /b 1
          cl.exe /nologo /O2 /GS- /Gs1000000 /DLPP_FREESTANDING /c runtime\windows_x86_64_min.c "/Fo:$work\lpp_runtime_min.obj" || exit /b 1
          set LPP_AOT=1
          target\release\lpp.exe "$work\direct.lpp" || exit /b 1
          target\release\lpp-link.exe pe "$work\direct.obj" "$work\lpp_runtime_min.obj" -o "$work\direct.exe" || exit /b 1
          "$work\direct.exe" > "$work\output.txt" || exit /b 1
          exit /b 0
          "@ | Set-Content -Path $cmd -Encoding ascii
          cmd.exe /d /c $cmd
          if ($LASTEXITCODE -ne 0) { throw "PE Kernel32 runtime build failed" }
          $actual = (Get-Content "$work\output.txt" | ForEach-Object { $_.Trim() }) -join "`n"
          if ($actual -ne "7") { throw "Unexpected direct PE output: $actual" }
      - name: King20 direct PE gate
        shell: pwsh
        run: .\tests\test_direct_pe_king20.ps1

  macos-host-link:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and test macOS toolchain
        run: |
          cargo test --locked
          cargo build --release --bin lpp --bin lpp-link
      - name: Compile runtime and run Cranelift Mach-O fallback
        run: |
          clang -O2 -fPIC -c lpp_runtime.c -o /tmp/lpp_runtime.o
          cp tests/arith.lpp /tmp/arith.lpp
          LPP_AOT=1 target/release/lpp /tmp/arith.lpp
          clang /tmp/arith.o /tmp/lpp_runtime.o -o /tmp/arith
          test "$(/tmp/arith)" = $'15\n5\n50\n2'
