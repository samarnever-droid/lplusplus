name: Deploy L++ website

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - "assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# This repository already uses a gh-pages branch. Deploying directly to that
# branch avoids the GitHub Pages environment protection rule that rejected the
# previous Actions-pages deployment from master.
permissions:
  contents: write

concurrency:
  group: gh-pages-deployment
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Build website
        working-directory: website
        run: |
          npm ci
          npm run build
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: website/dist
          keep_files: false
