name: "BPW: Benchmark Package Workflow"

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/bpw.yml'

permissions:
  contents: write

jobs:
  bpw-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build L++ toolchain
        run: cargo build --release --bin lpp --bin lpp-link

      - name: "BPW: Full benchmark suite"
        run: |
          set -e
          WORK=$(mktemp -d)
          RESULTS="$WORK/results"
          mkdir -p "$RESULTS"

          echo "========================================"
          echo " BPW: Benchmark Package Workflow"
          echo " Platform: Linux x86_64"
          echo "========================================"

          # ═══════════════════════════════════════
          # 1. CREATE MULTI-FILE L++ PROJECT
          # ═══════════════════════════════════════
          echo ""
          echo "=== Phase 1: Create L++ multi-file project ==="
          
          PRJ="$WORK/lpp_project"
          mkdir -p "$PRJ/utils" "$PRJ/stdlib"
          cp -r stdlib/* "$PRJ/stdlib/" 2>/dev/null || true

          cat > "$PRJ/utils/calc.lpp" << 'LPP'
          def add(a: Int, b: Int) -> Int:
              return a + b
          def multiply(a: Int, b: Int) -> Int:
              return a * b
          LPP

          cat > "$PRJ/bench_fib.lpp" << 'LPP'
          def fib(n: Int) -> Int:
              if n <= 1:
                  return n
              mut a := 0
              mut b := 1
              mut i := 2
              while i <= n:
                  c := a + b
                  a = b
                  b = c
                  i = i + 1
              return b
          LPP

          cat > "$PRJ/main.lpp" << 'LPP'
          import utils.calc
          import bench_fib

          def main():
              result := fib(35)
              print(result)
              s := add(100, 200)
              print(s)
              p := multiply(6, 7)
              print(p)
          LPP

          # ═══════════════════════════════════════
          # 2. BUILD WITH BOTH LINKERS
          # ═══════════════════════════════════════
          echo ""
          echo "=== Phase 2: Build L++ with both linkers ==="

          # Compile runtime
          cc -O2 -fPIC -c lpp_runtime.c -o "$WORK/lpp_runtime.o" -pthread
          cc -O2 -ffreestanding -fno-stack-protector -fno-pic -mno-red-zone \
            -c runtime/linux_x86_64_min.c -o "$WORK/lpp_runtime_min.o" 2>/dev/null || true

          # --- L++ with host linker (cc) ---
          echo "  Building with host linker (cc)..."
          HOST_COMPILE_START=$(date +%s%N)
          LPP_AOT=1 target/release/lpp "$PRJ/main.lpp"
          HOST_COMPILE_END=$(date +%s%N)
          HOST_COMPILE_MS=$(( (HOST_COMPILE_END - HOST_COMPILE_START) / 1000000 ))

          HOST_LINK_START=$(date +%s%N)
          cc "$PRJ/main.o" "$WORK/lpp_runtime.o" -o "$WORK/lpp_host" -lm -lpthread
          HOST_LINK_END=$(date +%s%N)
          HOST_LINK_MS=$(( (HOST_LINK_END - HOST_LINK_START) / 1000000 ))
          HOST_SIZE=$(stat -c%s "$WORK/lpp_host")

          HOST_RUN_START=$(date +%s%N)
          HOST_OUT=$("$WORK/lpp_host")
          HOST_RUN_END=$(date +%s%N)
          HOST_RUN_MS=$(( (HOST_RUN_END - HOST_RUN_START) / 1000000 ))

          echo "  Host: compile=${HOST_COMPILE_MS}ms link=${HOST_LINK_MS}ms run=${HOST_RUN_MS}ms size=${HOST_SIZE}"

          # --- L++ with direct linker (lpp-link) ---
          echo "  Building with direct linker (lpp-link)..."
          DIRECT_LINK_START=$(date +%s%N)
          if [ -f "$WORK/lpp_runtime_min.o" ]; then
            target/release/lpp-link "$PRJ/main.o" "$WORK/lpp_runtime_min.o" -o "$WORK/lpp_direct" 2>/dev/null && \
              DIRECT_OK=1 || DIRECT_OK=0
          else
            target/release/lpp-link "$PRJ/main.o" "$WORK/lpp_runtime.o" -o "$WORK/lpp_direct" 2>/dev/null && \
              DIRECT_OK=1 || DIRECT_OK=0
          fi
          DIRECT_LINK_END=$(date +%s%N)
          DIRECT_LINK_MS=$(( (DIRECT_LINK_END - DIRECT_LINK_START) / 1000000 ))

          if [ "$DIRECT_OK" = "1" ]; then
            chmod +x "$WORK/lpp_direct"
            DIRECT_SIZE=$(stat -c%s "$WORK/lpp_direct")
            DIRECT_RUN_START=$(date +%s%N)
            DIRECT_OUT=$("$WORK/lpp_direct")
            DIRECT_RUN_END=$(date +%s%N)
            DIRECT_RUN_MS=$(( (DIRECT_RUN_END - DIRECT_RUN_START) / 1000000 ))
            echo "  Direct: link=${DIRECT_LINK_MS}ms run=${DIRECT_RUN_MS}ms size=${DIRECT_SIZE}"
          else
            DIRECT_SIZE=0; DIRECT_RUN_MS=0; DIRECT_OUT="N/A"
            echo "  Direct: SKIPPED (link failed)"
          fi

          # ═══════════════════════════════════════
          # 3. RUST EQUIVALENT
          # ═══════════════════════════════════════
          echo ""
          echo "=== Phase 3: Rust equivalent ==="

          mkdir -p "$WORK/rust_bench/src"
          cat > "$WORK/rust_bench/Cargo.toml" << 'TOML'
          [package]
          name = "bench"
          version = "0.1.0"
          edition = "2021"
          TOML

          cat > "$WORK/rust_bench/src/main.rs" << 'RUST'
          fn fib(n: i64) -> i64 {
              if n <= 1 { return n; }
              let (mut a, mut b) = (0i64, 1i64);
              for _ in 2..=n { let c = a + b; a = b; b = c; }
              b
          }
          fn add(a: i64, b: i64) -> i64 { a + b }
          fn multiply(a: i64, b: i64) -> i64 { a * b }
          fn main() {
              println!("{}", fib(35));
              println!("{}", add(100, 200));
              println!("{}", multiply(6, 7));
          }
          RUST

          RUST_COMPILE_START=$(date +%s%N)
          cd "$WORK/rust_bench" && cargo build --release 2>/dev/null
          RUST_COMPILE_END=$(date +%s%N)
          RUST_COMPILE_MS=$(( (RUST_COMPILE_END - RUST_COMPILE_START) / 1000000 ))
          RUST_SIZE=$(stat -c%s "$WORK/rust_bench/target/release/bench")

          RUST_RUN_START=$(date +%s%N)
          RUST_OUT=$("$WORK/rust_bench/target/release/bench")
          RUST_RUN_END=$(date +%s%N)
          RUST_RUN_MS=$(( (RUST_RUN_END - RUST_RUN_START) / 1000000 ))

          echo "  Rust: compile=${RUST_COMPILE_MS}ms run=${RUST_RUN_MS}ms size=${RUST_SIZE}"
          cd "$GITHUB_WORKSPACE"

          # ═══════════════════════════════════════
          # 4. GO EQUIVALENT
          # ═══════════════════════════════════════
          echo ""
          echo "=== Phase 4: Go equivalent ==="

          mkdir -p "$WORK/go_bench"
          cat > "$WORK/go_bench/main.go" << 'GO'
          package main
          import "fmt"
          func fib(n int64) int64 {
              if n <= 1 { return n }
              a, b := int64(0), int64(1)
              for i := int64(2); i <= n; i++ { a, b = b, a+b }
              return b
          }
          func add(a, b int64) int64 { return a + b }
          func multiply(a, b int64) int64 { return a * b }
          func main() {
              fmt.Println(fib(35))
              fmt.Println(add(100, 200))
              fmt.Println(multiply(6, 7))
          }
          GO

          GO_COMPILE_START=$(date +%s%N)
          cd "$WORK/go_bench" && go build -o bench main.go
          GO_COMPILE_END=$(date +%s%N)
          GO_COMPILE_MS=$(( (GO_COMPILE_END - GO_COMPILE_START) / 1000000 ))
          GO_SIZE=$(stat -c%s "$WORK/go_bench/bench")

          GO_RUN_START=$(date +%s%N)
          GO_OUT=$("$WORK/go_bench/bench")
          GO_RUN_END=$(date +%s%N)
          GO_RUN_MS=$(( (GO_RUN_END - GO_RUN_START) / 1000000 ))

          echo "  Go: compile=${GO_COMPILE_MS}ms run=${GO_RUN_MS}ms size=${GO_SIZE}"
          cd "$GITHUB_WORKSPACE"

          # ═══════════════════════════════════════
          # 5. VERIFY ALL PRODUCE SAME OUTPUT
          # ═══════════════════════════════════════
          echo ""
          echo "=== Phase 5: Output verification ==="
          EXPECTED=$(printf '9227465\n300\n42')
          
          verify() {
            local name="$1" out="$2"
            if [ "$out" = "$EXPECTED" ]; then
              echo "  $name: PASS ✓"
            else
              echo "  $name: FAIL ✗ (got: $out)"
            fi
          }
          verify "L++ (host)"   "$HOST_OUT"
          [ "$DIRECT_OK" = "1" ] && verify "L++ (direct)" "$DIRECT_OUT"
          verify "Rust"         "$RUST_OUT"
          verify "Go"           "$GO_OUT"

          # ═══════════════════════════════════════
          # 6. GENERATE JSON REPORT
          # ═══════════════════════════════════════
          echo ""
          echo "=== Phase 6: Generate reports ==="

          cat > "$RESULTS/bpw_report.json" << JSONEOF
          {
            "bpw_version": "1.0",
            "platform": "linux-x86_64",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "project": {
              "files": 3,
              "modules": ["utils.calc", "bench_fib"],
              "stdlib_used": false,
              "language_features": ["import", "from_import", "dotted_path", "multi_file"]
            },
            "benchmarks": {
              "lpp_host": {
                "linker": "cc (host, libc)",
                "compile_ms": $HOST_COMPILE_MS,
                "link_ms": $HOST_LINK_MS,
                "run_ms": $HOST_RUN_MS,
                "binary_bytes": $HOST_SIZE,
                "output_correct": $([ "$HOST_OUT" = "$EXPECTED" ] && echo true || echo false)
              },
              "lpp_direct": {
                "linker": "lpp-link (freestanding)",
                "compile_ms": $HOST_COMPILE_MS,
                "link_ms": $DIRECT_LINK_MS,
                "run_ms": $DIRECT_RUN_MS,
                "binary_bytes": $DIRECT_SIZE,
                "output_correct": $([ "$DIRECT_OK" = "1" ] && [ "$DIRECT_OUT" = "$EXPECTED" ] && echo true || echo false)
              },
              "rust": {
                "compile_ms": $RUST_COMPILE_MS,
                "run_ms": $RUST_RUN_MS,
                "binary_bytes": $RUST_SIZE,
                "output_correct": $([ "$RUST_OUT" = "$EXPECTED" ] && echo true || echo false)
              },
              "go": {
                "compile_ms": $GO_COMPILE_MS,
                "run_ms": $GO_RUN_MS,
                "binary_bytes": $GO_SIZE,
                "output_correct": $([ "$GO_OUT" = "$EXPECTED" ] && echo true || echo false)
              }
            },
            "comparison": {
              "fastest_compile": "$([ $HOST_COMPILE_MS -lt $GO_COMPILE_MS ] && echo 'lpp' || echo 'go')",
              "smallest_binary": "$([ $HOST_SIZE -lt $GO_SIZE ] && echo 'lpp_host' || echo 'go')",
              "lpp_vs_rust_compile_ratio": "$(echo "scale=1; $RUST_COMPILE_MS / ($HOST_COMPILE_MS + $HOST_LINK_MS + 1)" | bc 2>/dev/null || echo 'N/A')x",
              "lpp_vs_go_compile_ratio": "$(echo "scale=1; $GO_COMPILE_MS / ($HOST_COMPILE_MS + $HOST_LINK_MS + 1)" | bc 2>/dev/null || echo 'N/A')x"
            }
          }
          JSONEOF

          # ═══════════════════════════════════════
          # 7. GENERATE MARKDOWN REPORT
          # ═══════════════════════════════════════
          cat > "$RESULTS/bpw_report.md" << MDEOF
          # BPW: Benchmark Package Workflow Report

          **Platform:** Linux x86_64  
          **Date:** $(date -u +%Y-%m-%d)  
          **Project:** 3-file L++ project with multi-file imports

          ## Compile + Link Time

          | Language | Compile (ms) | Link (ms) | Total (ms) |
          |----------|-------------|-----------|------------|
          | **L++ (host cc)** | ${HOST_COMPILE_MS} | ${HOST_LINK_MS} | $((HOST_COMPILE_MS + HOST_LINK_MS)) |
          | **L++ (lpp-link)** | ${HOST_COMPILE_MS} | ${DIRECT_LINK_MS} | $((HOST_COMPILE_MS + DIRECT_LINK_MS)) |
          | **Rust** | ${RUST_COMPILE_MS} | — | ${RUST_COMPILE_MS} |
          | **Go** | ${GO_COMPILE_MS} | — | ${GO_COMPILE_MS} |

          ## Runtime Performance

          | Language | Run (ms) | Binary Size |
          |----------|----------|-------------|
          | **L++ (host)** | ${HOST_RUN_MS} | $(echo "scale=1; $HOST_SIZE/1024" | bc)K |
          | **L++ (direct)** | ${DIRECT_RUN_MS} | $(echo "scale=1; $DIRECT_SIZE/1024" | bc 2>/dev/null || echo N/A)K |
          | **Rust** | ${RUST_RUN_MS} | $(echo "scale=1; $RUST_SIZE/1024" | bc)K |
          | **Go** | ${GO_RUN_MS} | $(echo "scale=1; $GO_SIZE/1024" | bc)K |

          ## Output Verification

          All languages produce identical output: \`9227465\`, \`300\`, \`42\` ✓

          ## L++ Project Structure
          \`\`\`
          main.lpp          import utils.calc, import bench_fib
          utils/calc.lpp    add(), multiply()
          bench_fib.lpp     fib(35) iterative
          \`\`\`
          MDEOF

          echo ""
          echo "=== Reports generated ==="
          cat "$RESULTS/bpw_report.md"
          echo ""
          echo "JSON: $RESULTS/bpw_report.json"
          
          # Copy project files for artifact
          cp -r "$PRJ" "$RESULTS/lpp_project"
          cp "$WORK/rust_bench/src/main.rs" "$RESULTS/rust_main.rs" 2>/dev/null || true
          cp "$WORK/go_bench/main.go" "$RESULTS/go_main.go" 2>/dev/null || true
          [ -f "$WORK/lpp_host" ] && cp "$WORK/lpp_host" "$RESULTS/lpp_host_binary" || true
          [ -f "$WORK/lpp_direct" ] && cp "$WORK/lpp_direct" "$RESULTS/lpp_direct_binary" || true

      - name: Upload BPW results
        uses: actions/upload-artifact@v4
        with:
          name: bpw-linux-results
          path: /tmp/tmp.*/results/

  bpw-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Locate MSVC
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          "VSCMD_BAT=$vs\VC\Auxiliary\Build\vcvars64.bat" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build L++ toolchain
        run: cargo build --release --bin lpp --bin lpp-link

      - name: "BPW: Full benchmark suite (Windows)"
        shell: pwsh
        run: |
          $work = Join-Path $env:RUNNER_TEMP "bpw"
          $results = Join-Path $work "results"
          New-Item -ItemType Directory -Force $work, $results, "$work\prj\utils" | Out-Null

          Write-Host "========================================"
          Write-Host " BPW: Benchmark Package Workflow"
          Write-Host " Platform: Windows x86_64"
          Write-Host "========================================"

          # --- Create L++ project ---
          @"
          def add(a: Int, b: Int) -> Int:
              return a + b
          def multiply(a: Int, b: Int) -> Int:
              return a * b
          "@ | Set-Content "$work\prj\utils\calc.lpp" -Encoding ascii

          @"
          def fib(n: Int) -> Int:
              if n <= 1:
                  return n
              mut a := 0
              mut b := 1
              mut i := 2
              while i <= n:
                  c := a + b
                  a = b
                  b = c
                  i = i + 1
              return b
          "@ | Set-Content "$work\prj\bench_fib.lpp" -Encoding ascii

          @"
          import utils.calc
          import bench_fib

          def main():
              result := fib(35)
              print(result)
              s := add(100, 200)
              print(s)
              p := multiply(6, 7)
              print(p)
          "@ | Set-Content "$work\prj\main.lpp" -Encoding ascii

          # --- Compile runtime ---
          $rtCmd = "$work\build_rt.cmd"
          @"
          @echo off
          call "%VSCMD_BAT%" >nul || exit /b 1
          cl.exe /nologo /O2 /GS- /Gs1000000 /DLPP_FREESTANDING /c runtime\windows_x86_64_min.c "/Fo:$work\rt.obj" || exit /b 1
          "@ | Set-Content $rtCmd -Encoding ascii
          cmd.exe /d /c $rtCmd

          # --- L++ compile ---
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          $env:LPP_AOT = "1"
          & target\release\lpp.exe "$work\prj\main.lpp"
          $sw.Stop()
          $lppCompileMs = $sw.ElapsedMilliseconds

          # --- L++ direct link (lpp-link pe) ---
          $sw.Restart()
          & target\release\lpp-link.exe pe "$work\prj\main.obj" "$work\rt.obj" -o "$work\lpp_direct.exe" 2>&1
          $sw.Stop()
          $directLinkMs = $sw.ElapsedMilliseconds
          $directSize = if (Test-Path "$work\lpp_direct.exe") { (Get-Item "$work\lpp_direct.exe").Length } else { 0 }

          $sw.Restart()
          $directOut = if (Test-Path "$work\lpp_direct.exe") { (& "$work\lpp_direct.exe" 2>&1) -join "`n" } else { "N/A" }
          $sw.Stop()
          $directRunMs = $sw.ElapsedMilliseconds

          Write-Host "L++ (direct): compile=${lppCompileMs}ms link=${directLinkMs}ms run=${directRunMs}ms size=$directSize"

          # --- Rust ---
          New-Item -ItemType Directory -Force "$work\rust\src" | Out-Null
          @"
          [package]
          name = "bench"
          version = "0.1.0"
          edition = "2021"
          "@ | Set-Content "$work\rust\Cargo.toml" -Encoding ascii
          @"
          fn fib(n: i64) -> i64 {
              if n <= 1 { return n; }
              let (mut a, mut b) = (0i64, 1i64);
              for _ in 2..=n { let c = a + b; a = b; b = c; }
              b
          }
          fn add(a: i64, b: i64) -> i64 { a + b }
          fn multiply(a: i64, b: i64) -> i64 { a * b }
          fn main() {
              println!("{}", fib(35));
              println!("{}", add(100, 200));
              println!("{}", multiply(6, 7));
          }
          "@ | Set-Content "$work\rust\src\main.rs" -Encoding ascii

          $sw.Restart()
          Push-Location "$work\rust"
          cargo build --release 2>&1 | Out-Null
          Pop-Location
          $sw.Stop()
          $rustCompileMs = $sw.ElapsedMilliseconds
          $rustSize = (Get-Item "$work\rust\target\release\bench.exe").Length
          $sw.Restart()
          $rustOut = (& "$work\rust\target\release\bench.exe" 2>&1) -join "`n"
          $sw.Stop()
          $rustRunMs = $sw.ElapsedMilliseconds
          Write-Host "Rust: compile=${rustCompileMs}ms run=${rustRunMs}ms size=$rustSize"

          # --- Go ---
          New-Item -ItemType Directory -Force "$work\go_bench" | Out-Null
          @"
          package main
          import "fmt"
          func fib(n int64) int64 {
              if n <= 1 { return n }
              a, b := int64(0), int64(1)
              for i := int64(2); i <= n; i++ { a, b = b, a+b }
              return b
          }
          func add(a, b int64) int64 { return a + b }
          func multiply(a, b int64) int64 { return a * b }
          func main() {
              fmt.Println(fib(35))
              fmt.Println(add(100, 200))
              fmt.Println(multiply(6, 7))
          }
          "@ | Set-Content "$work\go_bench\main.go" -Encoding ascii

          $sw.Restart()
          Push-Location "$work\go_bench"
          go build -o bench.exe main.go
          Pop-Location
          $sw.Stop()
          $goCompileMs = $sw.ElapsedMilliseconds
          $goSize = (Get-Item "$work\go_bench\bench.exe").Length
          $sw.Restart()
          $goOut = (& "$work\go_bench\bench.exe" 2>&1) -join "`n"
          $sw.Stop()
          $goRunMs = $sw.ElapsedMilliseconds
          Write-Host "Go: compile=${goCompileMs}ms run=${goRunMs}ms size=$goSize"

          # --- Verify ---
          $expected = "9227465`n300`n42"
          Write-Host "`n=== Output Verification ==="
          Write-Host "L++ direct: $(if($directOut.Trim() -eq $expected){'PASS'}else{'FAIL'})"
          Write-Host "Rust:       $(if($rustOut.Trim() -eq $expected){'PASS'}else{'FAIL'})"
          Write-Host "Go:         $(if($goOut.Trim() -eq $expected){'PASS'}else{'FAIL'})"

          # --- JSON report ---
          @"
          {
            "bpw_version": "1.0",
            "platform": "windows-x86_64",
            "timestamp": "$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')",
            "benchmarks": {
              "lpp_direct": {
                "linker": "lpp-link pe (freestanding)",
                "compile_ms": $lppCompileMs,
                "link_ms": $directLinkMs,
                "run_ms": $directRunMs,
                "binary_bytes": $directSize,
                "output_correct": $(if($directOut.Trim() -eq $expected){'true'}else{'false'})
              },
              "rust": {
                "compile_ms": $rustCompileMs,
                "run_ms": $rustRunMs,
                "binary_bytes": $rustSize,
                "output_correct": $(if($rustOut.Trim() -eq $expected){'true'}else{'false'})
              },
              "go": {
                "compile_ms": $goCompileMs,
                "run_ms": $goRunMs,
                "binary_bytes": $goSize,
                "output_correct": $(if($goOut.Trim() -eq $expected){'true'}else{'false'})
              }
            }
          }
          "@ | Set-Content "$results\bpw_report.json" -Encoding ascii

          Write-Host "`n=== BPW Complete ==="
          Write-Host "L++ compile: ${lppCompileMs}ms | Rust: ${rustCompileMs}ms | Go: ${goCompileMs}ms"
          Write-Host "L++ binary: $directSize bytes | Rust: $rustSize bytes | Go: $goSize bytes"

          # Copy project files
          Copy-Item -Recurse "$work\prj" "$results\lpp_project"
          if (Test-Path "$work\lpp_direct.exe") { Copy-Item "$work\lpp_direct.exe" "$results\" }

      - name: Upload BPW results
        uses: actions/upload-artifact@v4
        with:
          name: bpw-windows-results
          path: ${{ runner.temp }}/bpw/results/
