name: "BPW: Benchmark Package Workflow"

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['.github/workflows/bpw.yml']

permissions:
  contents: write

jobs:
  bpw-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with: { go-version: 'stable' }

      - name: Build L++ toolchain
        run: cargo build --release --bin lpp --bin lpp-link

      - name: "BPW: Linux full suite"
        shell: bash
        run: |
          set -e
          W=$(mktemp -d)
          R="$W/results"
          mkdir -p "$R/sources"

          cc -O2 -fPIC -c lpp_runtime.c -o "$W/rt.o" -pthread

          RUNS=10

          # ── System info ──
          CPU_MODEL=$(lscpu | grep "Model name" | sed 's/.*: *//')
          RAM_TOTAL=$(free -h | awk '/Mem:/{print $2}')
          OS_VER=$(cat /etc/os-release | grep PRETTY_NAME | cut -d'"' -f2)
          RUST_VER=$(rustc --version)
          GO_VER=$(go version)
          LPP_VER=$(target/release/lpp --version 2>&1 | head -1)
          CC_VER=$(cc --version | head -1)

          echo "========================================"
          echo " BPW v3: Benchmark Package Workflow"
          echo " Platform: Linux x86_64"
          echo " CPU: $CPU_MODEL"
          echo " RAM: $RAM_TOTAL"
          echo " OS:  $OS_VER"
          echo " L++: $LPP_VER"
          echo " Rust: $RUST_VER"
          echo " Go: $GO_VER"
          echo " CC: $CC_VER"
          echo " Runs per benchmark: $RUNS"
          echo "========================================"

          # ── Helper: run N times, collect stats ──
          run_bench() {
            local cmd="$1" n="$2" label="$3"
            local sum=0 min=999999999 max=0
            local times=""
            for i in $(seq 1 $n); do
              local START=$(date +%s%N)
              eval "$cmd" > /dev/null 2>&1
              local END=$(date +%s%N)
              local ms=$(( (END - START) / 1000000 ))
              sum=$((sum + ms))
              [ $ms -lt $min ] && min=$ms
              [ $ms -gt $max ] && max=$ms
              times="$times $ms"
            done
            local avg=$((sum / n))
            # stddev
            local sq_sum=0
            for t in $times; do
              local d=$((t - avg))
              sq_sum=$((sq_sum + d*d))
            done
            local variance=$((sq_sum / n))
            # integer sqrt approx
            local stddev=0
            if [ $variance -gt 0 ]; then
              stddev=$(echo "scale=0; sqrt($variance)" | bc 2>/dev/null || echo 0)
            fi
            echo "$avg $min $max $stddev"
          }

          # ══════════════════════════════════════════
          #  BENCH 1: CPU-HEAVY (fib40 + primes)
          # ══════════════════════════════════════════
          echo ""
          echo "=== Bench 1: CPU Heavy (fib(40) + count_primes(10000)) ==="

          cat > "$W/cpu.lpp" << 'EOF'
          def fib(n: Int) -> Int:
              if n <= 1:
                  return n
              mut a := 0
              mut b := 1
              mut i := 2
              while i <= n:
                  c := a + b
                  a = b
                  b = c
                  i = i + 1
              return b
          def is_prime(n: Int) -> Bool:
              if n < 2:
                  return false
              mut d := 2
              while d * d <= n:
                  if n - (n / d) * d == 0:
                      return false
                  d = d + 1
              return true
          def count_primes(limit: Int) -> Int:
              mut count := 0
              mut n := 2
              while n < limit:
                  if is_prime(n):
                      count = count + 1
                  n = n + 1
              return count
          def main():
              print(fib(40))
              print(count_primes(10000))
          EOF

          cat > "$W/cpu.rs" << 'EOF'
          fn fib(n: i64) -> i64 {
              if n <= 1 { return n; }
              let (mut a, mut b) = (0i64, 1i64);
              for _ in 2..=n { let c = a + b; a = b; b = c; }
              b
          }
          fn is_prime(n: i64) -> bool {
              if n < 2 { return false; }
              let mut d = 2i64;
              while d * d <= n { if n % d == 0 { return false; } d += 1; }
              true
          }
          fn count_primes(limit: i64) -> i64 {
              (2..limit).filter(|&n| is_prime(n)).count() as i64
          }
          fn main() { println!("{}", fib(40)); println!("{}", count_primes(10000)); }
          EOF

          cat > "$W/cpu.go" << 'EOF'
          package main
          import "fmt"
          func fib(n int64) int64 {
              if n <= 1 { return n }
              a, b := int64(0), int64(1)
              for i := int64(2); i <= n; i++ { a, b = b, a+b }
              return b
          }
          func isPrime(n int64) bool {
              if n < 2 { return false }
              for d := int64(2); d*d <= n; d++ { if n%d == 0 { return false } }
              return true
          }
          func countPrimes(limit int64) int64 {
              c := int64(0)
              for n := int64(2); n < limit; n++ { if isPrime(n) { c++ } }
              return c
          }
          func main() { fmt.Println(fib(40)); fmt.Println(countPrimes(10000)) }
          EOF

          CPU_EXP=$(printf '102334155\n1229')

          # Build all
          LPP_AOT=1 target/release/lpp "$W/cpu.lpp"
          cc "$W/cpu.o" "$W/rt.o" -o "$W/cpu_lpp" -lm -lpthread
          mkdir -p "$W/rcpu/src"
          printf '[package]\nname="b"\nversion="0.1.0"\nedition="2021"' > "$W/rcpu/Cargo.toml"
          cp "$W/cpu.rs" "$W/rcpu/src/main.rs"
          cd "$W/rcpu" && cargo build --release 2>/dev/null && cd "$GITHUB_WORKSPACE"
          cd "$W" && go build -o "$W/cpu_go" cpu.go && cd "$GITHUB_WORKSPACE"

          # Verify
          LPP_CPU_V=$("$W/cpu_lpp")
          RS_CPU_V=$("$W/rcpu/target/release/b")
          GO_CPU_V=$("$W/cpu_go")
          echo "  Verify: lpp=$([ "$LPP_CPU_V" = "$CPU_EXP" ] && echo PASS || echo FAIL) rust=$([ "$RS_CPU_V" = "$CPU_EXP" ] && echo PASS || echo FAIL) go=$([ "$GO_CPU_V" = "$CPU_EXP" ] && echo PASS || echo FAIL)"

          # Bench runs
          read LPP_CPU_AVG LPP_CPU_MIN LPP_CPU_MAX LPP_CPU_SD <<< $(run_bench "$W/cpu_lpp" $RUNS "lpp")
          read RS_CPU_AVG RS_CPU_MIN RS_CPU_MAX RS_CPU_SD <<< $(run_bench "$W/rcpu/target/release/b" $RUNS "rust")
          read GO_CPU_AVG GO_CPU_MIN GO_CPU_MAX GO_CPU_SD <<< $(run_bench "$W/cpu_go" $RUNS "go")
          LPP_CPU_SZ=$(stat -c%s "$W/cpu_lpp")
          RS_CPU_SZ=$(stat -c%s "$W/rcpu/target/release/b")
          GO_CPU_SZ=$(stat -c%s "$W/cpu_go")
          echo "  L++:  avg=${LPP_CPU_AVG}ms min=${LPP_CPU_MIN} max=${LPP_CPU_MAX} sd=${LPP_CPU_SD} size=${LPP_CPU_SZ}"
          echo "  Rust: avg=${RS_CPU_AVG}ms min=${RS_CPU_MIN} max=${RS_CPU_MAX} sd=${RS_CPU_SD} size=${RS_CPU_SZ}"
          echo "  Go:   avg=${GO_CPU_AVG}ms min=${GO_CPU_MIN} max=${GO_CPU_MAX} sd=${GO_CPU_SD} size=${GO_CPU_SZ}"

          # ══════════════════════════════════════════
          #  BENCH 2: RAM-HEAVY (100k list)
          # ══════════════════════════════════════════
          echo ""
          echo "=== Bench 2: RAM Heavy (100k list alloc+fill) ==="
          cat > "$W/ram.lpp" << 'EOF'
          def main():
              lst := List[Int]()
              mut i := 0
              while i < 100000:
                  list_push(lst, i * 3)
                  i = i + 1
              print(list_len(lst))
              print(list_get(lst, 99999))
          EOF
          cat > "$W/ram.rs" << 'EOF'
          fn main() {
              let mut v: Vec<i64> = Vec::new();
              for i in 0..100000i64 { v.push(i * 3); }
              println!("{}", v.len()); println!("{}", v[99999]);
          }
          EOF
          cat > "$W/ram.go" << 'EOF'
          package main
          import "fmt"
          func main() {
              v := make([]int64, 0)
              for i := int64(0); i < 100000; i++ { v = append(v, i*3) }
              fmt.Println(len(v)); fmt.Println(v[99999])
          }
          EOF
          RAM_EXP=$(printf '100000\n299997')

          LPP_AOT=1 target/release/lpp "$W/ram.lpp"
          cc "$W/ram.o" "$W/rt.o" -o "$W/ram_lpp" -lm -lpthread
          mkdir -p "$W/rram/src"
          printf '[package]\nname="b"\nversion="0.1.0"\nedition="2021"' > "$W/rram/Cargo.toml"
          cp "$W/ram.rs" "$W/rram/src/main.rs"
          cd "$W/rram" && cargo build --release 2>/dev/null && cd "$GITHUB_WORKSPACE"
          cd "$W" && go build -o "$W/ram_go" ram.go && cd "$GITHUB_WORKSPACE"

          LPP_RAM_V=$("$W/ram_lpp"); RS_RAM_V=$("$W/rram/target/release/b"); GO_RAM_V=$("$W/ram_go")
          echo "  Verify: lpp=$([ "$LPP_RAM_V" = "$RAM_EXP" ] && echo PASS || echo FAIL) rust=$([ "$RS_RAM_V" = "$RAM_EXP" ] && echo PASS || echo FAIL) go=$([ "$GO_RAM_V" = "$RAM_EXP" ] && echo PASS || echo FAIL)"

          read LPP_RAM_AVG LPP_RAM_MIN LPP_RAM_MAX LPP_RAM_SD <<< $(run_bench "$W/ram_lpp" $RUNS "lpp")
          read RS_RAM_AVG RS_RAM_MIN RS_RAM_MAX RS_RAM_SD <<< $(run_bench "$W/rram/target/release/b" $RUNS "rust")
          read GO_RAM_AVG GO_RAM_MIN GO_RAM_MAX GO_RAM_SD <<< $(run_bench "$W/ram_go" $RUNS "go")
          LPP_RAM_SZ=$(stat -c%s "$W/ram_lpp"); RS_RAM_SZ=$(stat -c%s "$W/rram/target/release/b"); GO_RAM_SZ=$(stat -c%s "$W/ram_go")
          echo "  L++:  avg=${LPP_RAM_AVG}ms  Rust: avg=${RS_RAM_AVG}ms  Go: avg=${GO_RAM_AVG}ms"

          # ══════════════════════════════════════════
          #  BENCH 3: FILE I/O (write+read 40KB)
          # ══════════════════════════════════════════
          echo ""
          echo "=== Bench 3: File I/O (write+read 40KB) ==="
          cat > "$W/fio.lpp" << 'EOF'
          def main():
              mut data := ""
              mut i := 0
              while i < 1000:
                  data = str_concat(data, "line of test data for file io benchmark\n")
                  i = i + 1
              write_file("/tmp/lpp_bio.txt", data)
              content := read_file("/tmp/lpp_bio.txt")
              print(str_len(content))
          EOF
          cat > "$W/fio.rs" << 'EOF'
          use std::fs;
          fn main() {
              let data: String = (0..1000).map(|_| "line of test data for file io benchmark\n").collect();
              fs::write("/tmp/rs_bio.txt", &data).unwrap();
              let c = fs::read_to_string("/tmp/rs_bio.txt").unwrap();
              println!("{}", c.len());
          }
          EOF
          cat > "$W/fio.go" << 'EOF'
          package main
          import ("fmt";"os";"strings")
          func main() {
              var b strings.Builder
              for i := 0; i < 1000; i++ { b.WriteString("line of test data for file io benchmark\n") }
              os.WriteFile("/tmp/go_bio.txt", []byte(b.String()), 0644)
              c, _ := os.ReadFile("/tmp/go_bio.txt")
              fmt.Println(len(c))
          }
          EOF

          LPP_AOT=1 target/release/lpp "$W/fio.lpp"
          cc "$W/fio.o" "$W/rt.o" -o "$W/fio_lpp" -lm -lpthread
          mkdir -p "$W/rfio/src"
          printf '[package]\nname="b"\nversion="0.1.0"\nedition="2021"' > "$W/rfio/Cargo.toml"
          cp "$W/fio.rs" "$W/rfio/src/main.rs"
          cd "$W/rfio" && cargo build --release 2>/dev/null && cd "$GITHUB_WORKSPACE"
          cd "$W" && go build -o "$W/fio_go" fio.go && cd "$GITHUB_WORKSPACE"

          LPP_FIO_OUT=$("$W/fio_lpp"); RS_FIO_OUT=$("$W/rfio/target/release/b"); GO_FIO_OUT=$("$W/fio_go")
          echo "  Verify: lpp=$LPP_FIO_OUT rust=$RS_FIO_OUT go=$GO_FIO_OUT"

          read LPP_FIO_AVG LPP_FIO_MIN LPP_FIO_MAX LPP_FIO_SD <<< $(run_bench "$W/fio_lpp" $RUNS "lpp")
          read RS_FIO_AVG RS_FIO_MIN RS_FIO_MAX RS_FIO_SD <<< $(run_bench "$W/rfio/target/release/b" $RUNS "rust")
          read GO_FIO_AVG GO_FIO_MIN GO_FIO_MAX GO_FIO_SD <<< $(run_bench "$W/fio_go" $RUNS "go")
          LPP_FIO_SZ=$(stat -c%s "$W/fio_lpp"); RS_FIO_SZ=$(stat -c%s "$W/rfio/target/release/b"); GO_FIO_SZ=$(stat -c%s "$W/fio_go")
          echo "  L++:  avg=${LPP_FIO_AVG}ms  Rust: avg=${RS_FIO_AVG}ms  Go: avg=${GO_FIO_AVG}ms"

          # ══════════════════════════════════════════
          #  BENCH 4: MULTI-FILE IMPORT
          # ══════════════════════════════════════════
          echo ""
          echo "=== Bench 4: Multi-file import project ==="
          mkdir -p "$W/mf/utils"
          cat > "$W/mf/utils/calc.lpp" << 'EOF'
          def add(a: Int, b: Int) -> Int:
              return a + b
          def multiply(a: Int, b: Int) -> Int:
              return a * b
          EOF
          cat > "$W/mf/fib_mod.lpp" << 'EOF'
          def fib(n: Int) -> Int:
              if n <= 1:
                  return n
              mut a := 0
              mut b := 1
              mut i := 2
              while i <= n:
                  c := a + b
                  a = b
                  b = c
                  i = i + 1
              return b
          EOF
          cat > "$W/mf/main.lpp" << 'EOF'
          import utils.calc
          import fib_mod
          def main():
              print(fib(35))
              print(add(100, 200))
              print(multiply(6, 7))
          EOF
          MF_EXP=$(printf '9227465\n300\n42')

          # Compile time (clean build)
          LPP_MF_COMPILE=$(run_bench "LPP_AOT=1 target/release/lpp $W/mf/main.lpp" $RUNS "lpp-compile" | awk '{print $1}')
          cc "$W/mf/main.o" "$W/rt.o" -o "$W/mf_lpp" -lm -lpthread
          LPP_MF_OUT=$("$W/mf_lpp")
          LPP_MF_SZ=$(stat -c%s "$W/mf_lpp")
          echo "  L++ multi-file: compile_avg=${LPP_MF_COMPILE}ms size=${LPP_MF_SZ} correct=$([ "$LPP_MF_OUT" = "$MF_EXP" ] && echo true || echo false)"

          # ══════════════════════════════════════════
          #  BENCH 5: LARGE PROJECT COMPILE (generated)
          # ══════════════════════════════════════════
          echo ""
          echo "=== Bench 5: Large project compile (100 functions, ~5000 LOC) ==="
          LARGE="$W/large.lpp"
          python3 -c "
          lines = []
          for i in range(100):
              lines.append(f'def func_{i}(x: Int) -> Int:')
              lines.append(f'    mut r := x')
              for j in range(20):
                  lines.append(f'    r = r + {j+1}')
              if i > 0:
                  lines.append(f'    r = r + func_{i-1}(1)')
              lines.append(f'    return r')
              lines.append('')
          lines.append('def main():')
          lines.append('    result := func_99(1)')
          lines.append('    print(result)')
          print('\n'.join(lines))
          " > "$LARGE"
          LOC=$(wc -l < "$LARGE")
          FUNCS=100
          echo "  Generated: $LOC lines, $FUNCS functions"

          # Clean compile timing
          LPP_LARGE_COMPILE=$(run_bench "LPP_AOT=1 target/release/lpp $LARGE" 5 "large" | awk '{print $1}')
          cc "$W/large.o" "$W/rt.o" -o "$W/large_lpp" -lm -lpthread
          LPP_LARGE_OUT=$("$W/large_lpp")
          LPP_LARGE_SZ=$(stat -c%s "$W/large_lpp")
          echo "  L++ large: compile_avg=${LPP_LARGE_COMPILE}ms size=${LPP_LARGE_SZ} output=$LPP_LARGE_OUT"

          # ══════════════════════════════════════════
          #  GENERATE JSON
          # ══════════════════════════════════════════
          cat > "$R/bpw_report.json" << ENDJSON
          {
            "bpw_version": "3.0",
            "platform": "linux-x86_64",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "runs_per_benchmark": $RUNS,
            "system": {
              "cpu": "$CPU_MODEL",
              "ram": "$RAM_TOTAL",
              "os": "$OS_VER",
              "cc": "$CC_VER",
              "lpp": "$LPP_VER",
              "rust": "$RUST_VER",
              "go": "$GO_VER"
            },
            "benchmarks": {
              "cpu_heavy": {
                "description": "fib(40) + count_primes(10000)",
                "lpp":  {"avg_ms":$LPP_CPU_AVG,"min_ms":$LPP_CPU_MIN,"max_ms":$LPP_CPU_MAX,"stddev_ms":$LPP_CPU_SD,"binary_bytes":$LPP_CPU_SZ,"correct":$([ "$LPP_CPU_V" = "$CPU_EXP" ] && echo true || echo false)},
                "rust": {"avg_ms":$RS_CPU_AVG,"min_ms":$RS_CPU_MIN,"max_ms":$RS_CPU_MAX,"stddev_ms":$RS_CPU_SD,"binary_bytes":$RS_CPU_SZ,"correct":$([ "$RS_CPU_V" = "$CPU_EXP" ] && echo true || echo false)},
                "go":   {"avg_ms":$GO_CPU_AVG,"min_ms":$GO_CPU_MIN,"max_ms":$GO_CPU_MAX,"stddev_ms":$GO_CPU_SD,"binary_bytes":$GO_CPU_SZ,"correct":$([ "$GO_CPU_V" = "$CPU_EXP" ] && echo true || echo false)}
              },
              "ram_heavy": {
                "description": "allocate+fill 100k list",
                "lpp":  {"avg_ms":$LPP_RAM_AVG,"min_ms":$LPP_RAM_MIN,"max_ms":$LPP_RAM_MAX,"stddev_ms":$LPP_RAM_SD,"binary_bytes":$LPP_RAM_SZ,"correct":$([ "$LPP_RAM_V" = "$RAM_EXP" ] && echo true || echo false)},
                "rust": {"avg_ms":$RS_RAM_AVG,"min_ms":$RS_RAM_MIN,"max_ms":$RS_RAM_MAX,"stddev_ms":$RS_RAM_SD,"binary_bytes":$RS_RAM_SZ,"correct":$([ "$RS_RAM_V" = "$RAM_EXP" ] && echo true || echo false)},
                "go":   {"avg_ms":$GO_RAM_AVG,"min_ms":$GO_RAM_MIN,"max_ms":$GO_RAM_MAX,"stddev_ms":$GO_RAM_SD,"binary_bytes":$GO_RAM_SZ,"correct":$([ "$GO_RAM_V" = "$RAM_EXP" ] && echo true || echo false)}
              },
              "file_io": {
                "description": "write+read 40KB file",
                "lpp":  {"avg_ms":$LPP_FIO_AVG,"min_ms":$LPP_FIO_MIN,"max_ms":$LPP_FIO_MAX,"stddev_ms":$LPP_FIO_SD,"binary_bytes":$LPP_FIO_SZ,"output":"$LPP_FIO_OUT"},
                "rust": {"avg_ms":$RS_FIO_AVG,"min_ms":$RS_FIO_MIN,"max_ms":$RS_FIO_MAX,"stddev_ms":$RS_FIO_SD,"binary_bytes":$RS_FIO_SZ,"output":"$RS_FIO_OUT"},
                "go":   {"avg_ms":$GO_FIO_AVG,"min_ms":$GO_FIO_MIN,"max_ms":$GO_FIO_MAX,"stddev_ms":$GO_FIO_SD,"binary_bytes":$GO_FIO_SZ,"output":"$GO_FIO_OUT"}
              },
              "multi_file": {
                "description": "3-file project with import",
                "lpp": {"compile_avg_ms":$LPP_MF_COMPILE,"binary_bytes":$LPP_MF_SZ,"correct":$([ "$LPP_MF_OUT" = "$MF_EXP" ] && echo true || echo false)}
              },
              "large_project": {
                "description": "${LOC} lines, ${FUNCS} functions, chain calls",
                "lpp": {"compile_avg_ms":$LPP_LARGE_COMPILE,"binary_bytes":$LPP_LARGE_SZ,"output":"$LPP_LARGE_OUT"}
              }
            }
          }
          ENDJSON

          echo "=== JSON Report ==="
          cat "$R/bpw_report.json"

          # Copy sources
          cp "$W/cpu.lpp" "$W/cpu.rs" "$W/cpu.go" "$R/sources/"
          cp "$W/ram.lpp" "$W/ram.rs" "$W/ram.go" "$R/sources/"
          cp "$W/fio.lpp" "$W/fio.rs" "$W/fio.go" "$R/sources/"
          cp -r "$W/mf" "$R/sources/multi_file_project"
          cp "$LARGE" "$R/sources/large_project.lpp"

      - uses: actions/upload-artifact@v4
        with:
          name: bpw-linux
          path: /tmp/tmp.*/results/

  bpw-windows:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with: { go-version: 'stable' }
      - name: Locate MSVC
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          "VSCMD_BAT=$vs\VC\Auxiliary\Build\vcvars64.bat" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Build L++ toolchain
        run: cargo build --release --bin lpp --bin lpp-link

      - name: "BPW: Windows full suite"
        shell: pwsh
        run: |
          $W = Join-Path $env:RUNNER_TEMP "bpw"
          $R = Join-Path $W "results"
          New-Item -ItemType Directory -Force $W,$R,"$R\sources","$W\mf\utils" | Out-Null
          $RUNS = 10

          # Build freestanding runtime
          $rtCmd = "$W\rt.cmd"
          @"
          @echo off
          call "%VSCMD_BAT%" >nul || exit /b 1
          cl.exe /nologo /O2 /GS- /Gs1000000 /DLPP_FREESTANDING /c runtime\windows_x86_64_min.c "/Fo:$W\rt.obj" || exit /b 1
          "@ | Set-Content $rtCmd -Encoding ascii
          cmd.exe /d /c $rtCmd

          # System info
          $cpuModel = (Get-CimInstance Win32_Processor).Name
          $ramTotal = [math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory/1GB,1)
          $osVer = (Get-CimInstance Win32_OperatingSystem).Caption
          $rustVer = (rustc --version 2>&1) -join ""
          $goVer = (go version 2>&1) -join ""
          $lppVer = (& target\release\lpp.exe --version 2>&1) -join ""

          Write-Host "BPW v3 Windows | CPU: $cpuModel | RAM: ${ramTotal}GB | OS: $osVer"

          function Run-Bench { param($exe, $n)
            $times = @()
            for ($i = 0; $i -lt $n; $i++) {
              $sw = [System.Diagnostics.Stopwatch]::StartNew()
              & $exe 2>&1 | Out-Null
              $sw.Stop()
              $times += $sw.ElapsedMilliseconds
            }
            $avg = [math]::Round(($times | Measure-Object -Average).Average)
            $mn = ($times | Measure-Object -Minimum).Minimum
            $mx = ($times | Measure-Object -Maximum).Maximum
            $mean = ($times | Measure-Object -Average).Average
            $sq = ($times | ForEach-Object { ($_ - $mean)*($_ - $mean) } | Measure-Object -Sum).Sum
            $sd = [math]::Round([math]::Sqrt($sq / $n))
            return @{avg=$avg; min=$mn; max=$mx; sd=$sd}
          }

          # ── BENCH 1: CPU ──
          Write-Host "`n=== Bench 1: CPU Heavy ==="
          @"
          def fib(n: Int) -> Int:
              if n <= 1:
                  return n
              mut a := 0
              mut b := 1
              mut i := 2
              while i <= n:
                  c := a + b
                  a = b
                  b = c
                  i = i + 1
              return b
          def is_prime(n: Int) -> Bool:
              if n < 2:
                  return false
              mut d := 2
              while d * d <= n:
                  if n - (n / d) * d == 0:
                      return false
                  d = d + 1
              return true
          def count_primes(limit: Int) -> Int:
              mut count := 0
              mut n := 2
              while n < limit:
                  if is_prime(n):
                      count = count + 1
                  n = n + 1
              return count
          def main():
              print(fib(40))
              print(count_primes(10000))
          "@ | Set-Content "$W\cpu.lpp" -Encoding ascii

          $env:LPP_AOT = "1"
          & target\release\lpp.exe "$W\cpu.lpp"
          & target\release\lpp-link.exe pe "$W\cpu.obj" "$W\rt.obj" -o "$W\cpu_lpp.exe" 2>&1
          $cpuExp = "102334155`n1229"

          if (Test-Path "$W\cpu_lpp.exe") {
            $lppCpuV = (& "$W\cpu_lpp.exe" 2>&1) -join "`n"
            Write-Host "  Verify: $(if($lppCpuV.Trim() -eq $cpuExp){'PASS'}else{'FAIL'})"
            $lppCpu = Run-Bench "$W\cpu_lpp.exe" $RUNS
            $lppCpuSz = (Get-Item "$W\cpu_lpp.exe").Length
            Write-Host "  L++: avg=$($lppCpu.avg)ms min=$($lppCpu.min) max=$($lppCpu.max) sd=$($lppCpu.sd) size=$lppCpuSz"
          }

          # Rust
          @"
          fn fib(n:i64)->i64{if n<=1{return n;}let(mut a,mut b)=(0i64,1i64);for _ in 2..=n{let c=a+b;a=b;b=c;}b}
          fn is_prime(n:i64)->bool{if n<2{return false;}let mut d=2i64;while d*d<=n{if n%d==0{return false;}d+=1;}true}
          fn count_primes(l:i64)->i64{(2..l).filter(|&n|is_prime(n)).count() as i64}
          fn main(){println!("{}",fib(40));println!("{}",count_primes(10000));}
          "@ | Set-Content "$W\cpu.rs" -Encoding ascii
          New-Item -ItemType Directory -Force "$W\rcpu\src" | Out-Null
          '[package]\nname="b"\nversion="0.1.0"\nedition="2021"' | Set-Content "$W\rcpu\Cargo.toml"
          Copy-Item "$W\cpu.rs" "$W\rcpu\src\main.rs"
          Push-Location "$W\rcpu"; cargo build --release 2>&1 | Out-Null; Pop-Location
          $rsCpuV = (& "$W\rcpu\target\release\b.exe" 2>&1) -join "`n"
          $rsCpu = Run-Bench "$W\rcpu\target\release\b.exe" $RUNS
          $rsCpuSz = (Get-Item "$W\rcpu\target\release\b.exe").Length
          Write-Host "  Rust: avg=$($rsCpu.avg)ms size=$rsCpuSz"

          # Go
          @"
          package main
          import "fmt"
          func fib(n int64) int64{if n<=1{return n};a,b:=int64(0),int64(1);for i:=int64(2);i<=n;i++{a,b=b,a+b};return b}
          func isPrime(n int64) bool{if n<2{return false};for d:=int64(2);d*d<=n;d++{if n%d==0{return false}};return true}
          func countPrimes(l int64) int64{c:=int64(0);for n:=int64(2);n<l;n++{if isPrime(n){c++}};return c}
          func main(){fmt.Println(fib(40));fmt.Println(countPrimes(10000))}
          "@ | Set-Content "$W\cpu.go" -Encoding ascii
          Push-Location $W; go build -o "$W\cpu_go.exe" cpu.go; Pop-Location
          $goCpu = Run-Bench "$W\cpu_go.exe" $RUNS
          $goCpuSz = (Get-Item "$W\cpu_go.exe").Length
          Write-Host "  Go: avg=$($goCpu.avg)ms size=$goCpuSz"

          # ── BENCH 2: RAM ──
          Write-Host "`n=== Bench 2: RAM Heavy ==="
          @"
          def main():
              lst := List[Int]()
              mut i := 0
              while i < 100000:
                  list_push(lst, i * 3)
                  i = i + 1
              print(list_len(lst))
              print(list_get(lst, 99999))
          "@ | Set-Content "$W\ram.lpp" -Encoding ascii
          & target\release\lpp.exe "$W\ram.lpp"
          & target\release\lpp-link.exe pe "$W\ram.obj" "$W\rt.obj" -o "$W\ram_lpp.exe" 2>&1
          if (Test-Path "$W\ram_lpp.exe") {
            $lppRam = Run-Bench "$W\ram_lpp.exe" $RUNS
            $lppRamSz = (Get-Item "$W\ram_lpp.exe").Length
            Write-Host "  L++: avg=$($lppRam.avg)ms size=$lppRamSz"
          }

          # ── BENCH 3: MULTI-FILE ──
          Write-Host "`n=== Bench 3: Multi-file import ==="
          @"
          def add(a: Int, b: Int) -> Int:
              return a + b
          def multiply(a: Int, b: Int) -> Int:
              return a * b
          "@ | Set-Content "$W\mf\utils\calc.lpp" -Encoding ascii
          @"
          def fib(n: Int) -> Int:
              if n <= 1:
                  return n
              mut a := 0
              mut b := 1
              mut i := 2
              while i <= n:
                  c := a + b
                  a = b
                  b = c
                  i = i + 1
              return b
          "@ | Set-Content "$W\mf\fib_mod.lpp" -Encoding ascii
          @"
          import utils.calc
          import fib_mod
          def main():
              print(fib(35))
              print(add(100, 200))
              print(multiply(6, 7))
          "@ | Set-Content "$W\mf\main.lpp" -Encoding ascii
          $mfExp = "9227465`n300`n42"
          & target\release\lpp.exe "$W\mf\main.lpp"
          & target\release\lpp-link.exe pe "$W\mf\main.obj" "$W\rt.obj" -o "$W\mf_lpp.exe" 2>&1
          if (Test-Path "$W\mf_lpp.exe") {
            $lppMfOut = (& "$W\mf_lpp.exe" 2>&1) -join "`n"
            $lppMfSz = (Get-Item "$W\mf_lpp.exe").Length
            Write-Host "  L++: size=$lppMfSz correct=$(if($lppMfOut.Trim() -eq $mfExp){'true'}else{'false'})"
          }

          # ── JSON ──
          $json = @{
            bpw_version = "3.0"
            platform = "windows-x86_64"
            timestamp = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            runs_per_benchmark = $RUNS
            system = @{
              cpu = "$cpuModel"
              ram = "${ramTotal}GB"
              os = "$osVer"
              lpp = "$lppVer"
              rust = "$rustVer"
              go = "$goVer"
            }
            benchmarks = @{
              cpu_heavy = @{
                description = "fib(40) + count_primes(10000)"
                lpp = @{avg_ms=$lppCpu.avg;min_ms=$lppCpu.min;max_ms=$lppCpu.max;stddev_ms=$lppCpu.sd;binary_bytes=$lppCpuSz;correct=($lppCpuV.Trim() -eq $cpuExp)}
                rust = @{avg_ms=$rsCpu.avg;min_ms=$rsCpu.min;max_ms=$rsCpu.max;stddev_ms=$rsCpu.sd;binary_bytes=$rsCpuSz}
                go = @{avg_ms=$goCpu.avg;min_ms=$goCpu.min;max_ms=$goCpu.max;stddev_ms=$goCpu.sd;binary_bytes=$goCpuSz}
              }
              ram_heavy = @{
                description = "100k list alloc"
                lpp = @{avg_ms=$lppRam.avg;min_ms=$lppRam.min;max_ms=$lppRam.max;stddev_ms=$lppRam.sd;binary_bytes=$lppRamSz}
              }
              multi_file = @{
                description = "3-file import project (lpp-link PE)"
                lpp = @{binary_bytes=$lppMfSz;correct=($lppMfOut.Trim() -eq $mfExp)}
              }
            }
          } | ConvertTo-Json -Depth 5
          $json | Set-Content "$R\bpw_report.json" -Encoding ascii
          Write-Host $json
          Write-Host "`n=== BPW Windows Complete ==="

      - uses: actions/upload-artifact@v4
        with:
          name: bpw-windows
          path: ${{ runner.temp }}/bpw/results/

  bpw-merge:
    needs: [bpw-linux, bpw-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bpw-linux
          path: linux/
      - uses: actions/download-artifact@v4
        with:
          name: bpw-windows
          path: windows/

      - name: Merge reports
        run: |
          mkdir -p merged
          python3 << 'PYEOF'
          import json, glob, os

          merged = {"bpw_version":"3.0","platforms":{}}
          for pat, name in [("linux/**/bpw_report.json","linux-x86_64"),("windows/**/bpw_report.json","windows-x86_64")]:
            files = glob.glob(pat, recursive=True)
            if files:
              with open(files[0]) as f:
                merged["platforms"][name] = json.load(f)

          # Print comparison table
          print("=" * 80)
          print(" BPW v3: CROSS-PLATFORM BENCHMARK REPORT")
          print("=" * 80)

          for pname, pdata in merged["platforms"].items():
            sys = pdata.get("system", {})
            print(f"\n{'─'*80}")
            print(f"Platform: {pname}")
            print(f"CPU: {sys.get('cpu','?')} | RAM: {sys.get('ram','?')} | OS: {sys.get('os','?')}")
            print(f"L++: {sys.get('lpp','?')} | Rust: {sys.get('rust','?')} | Go: {sys.get('go','?')}")
            print(f"Runs per benchmark: {pdata.get('runs_per_benchmark','?')}")
            print(f"{'─'*80}")
            print(f"{'Benchmark':<22} {'Lang':<6} {'Avg ms':<9} {'Min':<6} {'Max':<6} {'StdDev':<8} {'Size KB':<10} {'OK'}")
            print(f"{'-'*22} {'-'*6} {'-'*9} {'-'*6} {'-'*6} {'-'*8} {'-'*10} {'-'*3}")

            for bname, bdata in pdata.get("benchmarks", {}).items():
              for lang in ["lpp","rust","go"]:
                if lang in bdata:
                  d = bdata[lang]
                  avg = d.get("avg_ms", d.get("compile_avg_ms", "—"))
                  mn = d.get("min_ms", "—")
                  mx = d.get("max_ms", "—")
                  sd = d.get("stddev_ms", "—")
                  sz = round(d.get("binary_bytes",0)/1024,1)
                  ok = "✓" if d.get("correct") in [True,"true"] else ("" if "correct" not in d else "✗")
                  print(f"{bname:<22} {lang:<6} {str(avg):<9} {str(mn):<6} {str(mx):<6} {str(sd):<8} {sz:<10} {ok}")

          print("=" * 80)

          with open("merged/bpw_merged.json", "w") as f:
            json.dump(merged, f, indent=2)
          print(f"\nMerged: merged/bpw_merged.json ({len(json.dumps(merged))} bytes)")
          PYEOF

          echo ""
          echo "=== All artifacts ==="
          echo "--- Linux ---"
          find linux/ -type f | head -20
          echo "--- Windows ---"
          find windows/ -type f | head -20
          echo "--- Merged ---"
          ls -la merged/

      - uses: actions/upload-artifact@v4
        with:
          name: bpw-merged-report
          path: merged/
