name: Remote Debug Terminal

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  terminal:
    runs-on: windows-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Locate MSVC
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          "VSCMD_BAT=$vs\VC\Auxiliary\Build\vcvars64.bat" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build toolchain
        run: cargo build --release --bin lpp --bin lpp-link

      - name: Prepare debug environment
        shell: pwsh
        run: |
          $work = "C:\dbg"
          New-Item -ItemType Directory -Force $work | Out-Null
          $buildRt = "$work\build_rt.cmd"
          @"
          @echo off
          call "%VSCMD_BAT%" >nul || exit /b 1
          cl.exe /nologo /O2 /GS- /Gs1000000 /DLPP_FREESTANDING /c runtime\windows_x86_64_min.c "/Fo:$work\lpp_runtime_min.obj" || exit /b 1
          "@ | Set-Content -Path $buildRt -Encoding ascii
          cmd.exe /d /c $buildRt
          @"
          def main():
              print(7)
          "@ | Set-Content "$work\direct.lpp" -Encoding ascii
          $env:LPP_AOT = "1"
          & target\release\lpp.exe "$work\direct.lpp"
          & target\release\lpp-link.exe pe "$work\direct.obj" "$work\lpp_runtime_min.obj" -o "$work\direct.exe" 2>&1
          Copy-Item -Recurse -Force . C:\lpp
          Copy-Item target\release\lpp.exe C:\lpp\lpp.exe
          Copy-Item target\release\lpp-link.exe C:\lpp\lpp-link.exe
          Copy-Item -Recurse -Force C:\dbg C:\lpp\dbg
          Set-Location C:\lpp
          git config user.name "0x4171341"
          git config user.email "0x4171341@proton.me"
          Write-Host "Debug env ready"

      - name: Start terminal server and tunnel
        shell: pwsh
        run: |
          # Node.js HTTP server (pre-installed on GH runners, most reliable)
          @"
          const http = require('http');
          const { execSync } = require('child_process');
          const server = http.createServer((req, res) => {
            if (req.method === 'POST') {
              let body = '';
              req.on('data', c => body += c);
              req.on('end', () => {
                let cmd = body;
                if (body.startsWith('cmd=')) cmd = decodeURIComponent(body.slice(4).replace(/\+/g,' '));
                try {
                  const out = execSync('powershell -EP Bypass -C "Set-Location C:\\lpp; ' + cmd.replace(/"/g,'`"') + '"',
                    {timeout: 120000, maxBuffer: 10*1024*1024}).toString();
                  res.writeHead(200, {'Content-Type':'text/plain; charset=utf-8'});
                  res.end(out);
                } catch(e) {
                  res.writeHead(200, {'Content-Type':'text/plain; charset=utf-8'});
                  res.end((e.stdout||'')+(e.stderr||'')+'\nEXIT: '+(e.status||'error'));
                }
              });
            } else {
              res.writeHead(200, {'Content-Type':'text/plain'});
              res.end('ok');
            }
          });
          server.listen(7681, '0.0.0.0', () => console.log('Listening on :7681'));
          "@ | Set-Content C:\srv.js -Encoding UTF8
          
          Start-Process node -ArgumentList "C:\srv.js" -WindowStyle Hidden -RedirectStandardOutput C:\srv_out.txt -RedirectStandardError C:\srv_err.txt
          Start-Sleep 3
          
          # Verify
          $test = try { (Invoke-WebRequest http://localhost:7681/ -TimeoutSec 5 -UseBasicParsing).Content } catch { "FAIL: $_" }
          Write-Host "Server test: $test"
          if (Test-Path C:\srv_err.txt) { Get-Content C:\srv_err.txt }
          
          # Try cloudflared with --protocol h2mux to avoid HTTP/2 issues
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile C:\cf.exe
          Start-Process C:\cf.exe -ArgumentList "tunnel","--url","http://127.0.0.1:7681","--protocol","h2mux" -NoNewWindow -PassThru -RedirectStandardOutput C:\cf_out.txt -RedirectStandardError C:\cf_err.txt
          Start-Sleep 20
          
          $url = ""
          for ($t = 0; $t -lt 20; $t++) {
            Start-Sleep 2
            $log = (Get-Content C:\cf_out.txt -Raw -EA SilentlyContinue) + (Get-Content C:\cf_err.txt -Raw -EA SilentlyContinue)
            if ($log -match "(https://[a-z0-9-]+\.trycloudflare\.com)") { $url = $Matches[1]; break }
          }
          
          Write-Host "TUNNEL=$url"
          $url | Out-File C:\tunnel_url.txt
          
          # Verify local first
          $loc = try { (Invoke-WebRequest "http://127.0.0.1:7681/" -TimeoutSec 5 -UseBasicParsing).Content } catch { "LocalFail: $_" }
          Write-Host "Local: $loc"
          
          # Verify external
          if ($url) {
            Start-Sleep 5
            $ext = try { (Invoke-WebRequest "$url/" -TimeoutSec 15 -UseBasicParsing).Content } catch { "ExtFail: $_" }
            Write-Host "External: $ext"
          }
          
          # Show cloudflared logs for debugging
          if (Test-Path C:\cf_err.txt) { Get-Content C:\cf_err.txt | Select-Object -Last 10 }

      - name: Upload tunnel URL
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: C:\tunnel_url.txt

      - name: Keep alive
        shell: pwsh
        run: |
          $url = (Get-Content C:\tunnel_url.txt -EA SilentlyContinue).Trim()
          Write-Host "TUNNEL: $url"
          $i = 0
          while ($i -lt 3000) { 
            Start-Sleep 1; $i++
            if ($i % 120 -eq 0) { Write-Host "[$([math]::Floor($i/60))m] alive" }
          }
