name: Remote Debug Terminal

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  terminal:
    runs-on: windows-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Locate MSVC
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          "VSCMD_BAT=$vs\VC\Auxiliary\Build\vcvars64.bat" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build toolchain
        run: cargo build --release --bin lpp --bin lpp-link

      - name: Prepare debug environment
        shell: pwsh
        run: |
          $work = "C:\dbg"
          New-Item -ItemType Directory -Force $work | Out-Null
          $buildRt = "$work\build_rt.cmd"
          @"
          @echo off
          call "%VSCMD_BAT%" >nul || exit /b 1
          cl.exe /nologo /O2 /GS- /Gs1000000 /DLPP_FREESTANDING /c runtime\windows_x86_64_min.c "/Fo:$work\lpp_runtime_min.obj" || exit /b 1
          "@ | Set-Content -Path $buildRt -Encoding ascii
          cmd.exe /d /c $buildRt
          @"
          def main():
              print(7)
          "@ | Set-Content "$work\direct.lpp" -Encoding ascii
          $env:LPP_AOT = "1"
          & target\release\lpp.exe "$work\direct.lpp"
          & target\release\lpp-link.exe pe "$work\direct.obj" "$work\lpp_runtime_min.obj" -o "$work\direct.exe" 2>&1
          Copy-Item -Recurse -Force . C:\lpp
          Copy-Item target\release\lpp.exe C:\lpp\lpp.exe
          Copy-Item target\release\lpp-link.exe C:\lpp\lpp-link.exe
          Copy-Item -Recurse -Force C:\dbg C:\lpp\dbg
          Set-Location C:\lpp
          git config user.name "0x4171341"
          git config user.email "0x4171341@proton.me"
          Write-Host "Debug env ready"

      - name: Install and start sshd tunnel
        shell: pwsh
        run: |
          # Use upterm for bidirectional terminal
          Invoke-WebRequest -Uri "https://github.com/nicholasgasior/gash/releases/download/v0.3.0/gash_0.3.0_windows_amd64.zip" -OutFile C:\gash.zip -ErrorAction SilentlyContinue
          
          # Fallback: use tmate-style approach with cloudflared + actual working server
          # The key insight: cloudflared needs the HTTP server on 0.0.0.0, not localhost
          
          # Write a Go-based tiny HTTP server (Go is pre-installed on GH runners)
          @'
          package main
          import (
            "fmt"
            "io"
            "net/http"
            "os/exec"
            "strings"
          )
          func main() {
            http.HandleFunc("/", func(w http.ResponseWriter, r *http.Request) {
              if r.Method == "POST" {
                body, _ := io.ReadAll(r.Body)
                parts := strings.SplitN(string(body), "=", 2)
                cmd := ""
                if len(parts) == 2 { cmd = parts[1] } else { cmd = string(body) }
                // URL decode
                cmd = strings.ReplaceAll(cmd, "+", " ")
                cmd = strings.ReplaceAll(cmd, "%5C", "\\")
                cmd = strings.ReplaceAll(cmd, "%3A", ":")
                cmd = strings.ReplaceAll(cmd, "%2F", "/")
                cmd = strings.ReplaceAll(cmd, "%22", "\"")
                cmd = strings.ReplaceAll(cmd, "%27", "'")
                cmd = strings.ReplaceAll(cmd, "%7C", "|")
                cmd = strings.ReplaceAll(cmd, "%26", "&")
                cmd = strings.ReplaceAll(cmd, "%3E", ">")
                cmd = strings.ReplaceAll(cmd, "%3C", "<")
                cmd = strings.ReplaceAll(cmd, "%2C", ",")
                cmd = strings.ReplaceAll(cmd, "%3B", ";")
                cmd = strings.ReplaceAll(cmd, "%28", "(")
                cmd = strings.ReplaceAll(cmd, "%29", ")")
                cmd = strings.ReplaceAll(cmd, "%24", "$")
                cmd = strings.ReplaceAll(cmd, "%40", "@")
                cmd = strings.ReplaceAll(cmd, "%23", "#")
                cmd = strings.ReplaceAll(cmd, "%21", "!")
                cmd = strings.ReplaceAll(cmd, "%2A", "*")
                cmd = strings.ReplaceAll(cmd, "%0D%0A", "\n")
                cmd = strings.ReplaceAll(cmd, "%0A", "\n")
                
                out, err := exec.Command("powershell", "-EP", "Bypass", "-C",
                  "Set-Location C:\\lpp; " + cmd).CombinedOutput()
                w.Header().Set("Content-Type", "text/plain; charset=utf-8")
                if err != nil {
                  fmt.Fprintf(w, "%s\nERROR: %v", string(out), err)
                } else {
                  w.Write(out)
                }
              } else {
                w.Write([]byte("ok"))
              }
            })
            fmt.Println("Listening on :7681")
            http.ListenAndServe("0.0.0.0:7681", nil)
          }
          '@ | Set-Content C:\srv.go -Encoding UTF8
          
          # Build and run Go server
          Start-Process go -ArgumentList "run","C:\srv.go" -WindowStyle Hidden -RedirectStandardOutput C:\srv_out.txt -RedirectStandardError C:\srv_err.txt
          Start-Sleep 5
          
          # Verify server
          $test = try { (Invoke-WebRequest http://localhost:7681/ -TimeoutSec 5 -UseBasicParsing).Content } catch { "FAIL: $_" }
          Write-Host "Server test: $test"
          if (Test-Path C:\srv_err.txt) { Get-Content C:\srv_err.txt | Select-Object -First 3 }
          
          # Download and start cloudflared  
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile C:\cf.exe
          Start-Process C:\cf.exe -ArgumentList "tunnel","--url","http://localhost:7681" -NoNewWindow -PassThru -RedirectStandardOutput C:\cf_out.txt -RedirectStandardError C:\cf_err.txt
          Start-Sleep 15
          
          $url = ""
          for ($t = 0; $t -lt 20; $t++) {
            Start-Sleep 2
            $log = (Get-Content C:\cf_out.txt -Raw -EA SilentlyContinue) + (Get-Content C:\cf_err.txt -Raw -EA SilentlyContinue)
            if ($log -match "(https://[a-z0-9-]+\.trycloudflare\.com)") { $url = $Matches[1]; break }
          }
          
          Write-Host "TUNNEL=$url"
          $url | Out-File C:\tunnel_url.txt
          
          # Verify external access
          Start-Sleep 3
          $ext = try { (Invoke-WebRequest "$url/" -TimeoutSec 10 -UseBasicParsing).Content } catch { "ExtFail: $_" }
          Write-Host "External: $ext"

      - name: Upload tunnel URL
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: C:\tunnel_url.txt

      - name: Keep alive
        shell: pwsh
        run: |
          $url = (Get-Content C:\tunnel_url.txt -EA SilentlyContinue).Trim()
          Write-Host "TUNNEL: $url"
          $i = 0
          while ($i -lt 3000) { 
            Start-Sleep 1; $i++
            if ($i % 120 -eq 0) { Write-Host "[$([math]::Floor($i/60))m] alive" }
          }
