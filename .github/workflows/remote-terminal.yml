name: Remote Debug Terminal

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  terminal:
    runs-on: windows-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Locate MSVC
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          "VSCMD_BAT=$vs\VC\Auxiliary\Build\vcvars64.bat" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build toolchain
        shell: pwsh
        run: cargo build --release --bin lpp --bin lpp-link

      - name: Prepare debug environment
        shell: pwsh
        run: |
          $work = "C:\dbg"
          New-Item -ItemType Directory -Force $work | Out-Null
          $buildRt = "$work\build_rt.cmd"
          @"
          @echo off
          call "%VSCMD_BAT%" >nul || exit /b 1
          cl.exe /nologo /O2 /GS- /Gs1000000 /DLPP_FREESTANDING /c runtime\windows_x86_64_min.c "/Fo:$work\lpp_runtime_min.obj" || exit /b 1
          "@ | Set-Content -Path $buildRt -Encoding ascii
          cmd.exe /d /c $buildRt
          @"
          def main():
              print(7)
          "@ | Set-Content "$work\direct.lpp" -Encoding ascii
          $env:LPP_AOT = "1"
          & target\release\lpp.exe "$work\direct.lpp"
          & target\release\lpp-link.exe pe "$work\direct.obj" "$work\lpp_runtime_min.obj" -o "$work\direct.exe" 2>&1
          Copy-Item -Recurse -Force . C:\lpp
          Copy-Item target\release\lpp.exe C:\lpp\lpp.exe
          Copy-Item target\release\lpp-link.exe C:\lpp\lpp-link.exe
          Copy-Item -Recurse -Force C:\dbg C:\lpp\dbg
          git config user.name "0x4171341"
          git config user.email "0x4171341@proton.me"
          Write-Host "Debug environment ready at C:\lpp and C:\dbg"

      - name: Start API server and tunnel
        shell: pwsh
        run: |
          # Register URL ACL for HttpListener
          netsh http add urlacl url=http://+:7681/ user=Everyone 2>&1 | Out-Null
          # PowerShell API server script
          @'
          Add-Type -AssemblyName System.Web
          $l = New-Object System.Net.HttpListener
          $l.Prefixes.Add("http://+:7681/")
          $l.Start()
          [Console]::Error.WriteLine("API listening on :7681")
          while ($true) {
            try {
              $c = $l.GetContext()
              $rq = $c.Request; $rs = $c.Response
              if ($rq.HttpMethod -eq "POST" -and $rq.RawUrl -eq "/exec") {
                $rd = New-Object System.IO.StreamReader($rq.InputStream,[System.Text.Encoding]::UTF8)
                $bd = $rd.ReadToEnd(); $rd.Close()
                $cmd = ([System.Web.HttpUtility]::ParseQueryString($bd))["cmd"]
                try {
                  $psi = New-Object System.Diagnostics.ProcessStartInfo
                  $psi.FileName = "powershell.exe"
                  $psi.Arguments = "-EP Bypass -C `"Set-Location C:\lpp; $cmd`""
                  $psi.UseShellExecute = $false
                  $psi.RedirectStandardOutput = $true
                  $psi.RedirectStandardError = $true
                  $psi.CreateNoWindow = $true
                  $p = [System.Diagnostics.Process]::Start($psi)
                  $o = $p.StandardOutput.ReadToEnd() + $p.StandardError.ReadToEnd()
                  $p.WaitForExit(120000)
                } catch { $o = "ERROR: $_" }
                $b = [System.Text.Encoding]::UTF8.GetBytes($o)
                $rs.ContentType = "text/plain; charset=utf-8"
                $rs.StatusCode = 200
                $rs.ContentLength64 = $b.Length
                $rs.OutputStream.Write($b, 0, $b.Length)
                $rs.Close()
              } else {
                $b = [System.Text.Encoding]::UTF8.GetBytes("ok")
                $rs.StatusCode = 200
                $rs.ContentLength64 = $b.Length
                $rs.OutputStream.Write($b, 0, $b.Length)
                $rs.Close()
              }
            } catch {
              [Console]::Error.WriteLine("Listener error: $_")
            }
          }
          '@ | Set-Content C:\srv.ps1 -Encoding UTF8
          # Start server and capture any startup errors
          $proc = Start-Process powershell -ArgumentList "-EP","Bypass","-File","C:\srv.ps1" `
            -PassThru -RedirectStandardError C:\srv_err.txt -WindowStyle Hidden
          Start-Sleep 5
          Write-Host "Server PID: $($proc.Id) HasExited: $($proc.HasExited)"
          if (Test-Path C:\srv_err.txt) { Get-Content C:\srv_err.txt | Select-Object -First 3 }
          # Verify port
          $test = try { (Invoke-WebRequest -Uri http://localhost:7681/ -TimeoutSec 5 -UseBasicParsing).Content } catch { "FAIL: $_" }
          Write-Host "API self-test: $test"
          # Cloudflare tunnel
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile C:\cf.exe
          Start-Process C:\cf.exe -ArgumentList "tunnel","--url","http://localhost:7681" `
            -NoNewWindow -PassThru -RedirectStandardOutput C:\cf_out.txt -RedirectStandardError C:\cf_err.txt
          Start-Sleep 15
          $url = ""
          for ($t = 0; $t -lt 20; $t++) {
            Start-Sleep 2
            $log = (Get-Content C:\cf_out.txt -Raw -EA SilentlyContinue) + (Get-Content C:\cf_err.txt -Raw -EA SilentlyContinue)
            if ($log -match "(https://[a-z0-9-]+\.trycloudflare\.com)") { $url = $Matches[1]; break }
          }
          Write-Host "TUNNEL_URL=$url"
          # Quick tunnel verification
          if ($url) {
            Start-Sleep 3
            $ext = try { (Invoke-WebRequest -Uri "$url/" -TimeoutSec 10 -UseBasicParsing).Content } catch { "ExtFail: $_" }
            Write-Host "External test: $ext"
          }
          $url | Out-File C:\tunnel_url.txt
          "TUNNEL_URL=$url" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload tunnel URL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: C:\tunnel_url.txt

      - name: Keep alive
        shell: pwsh
        run: |
          Write-Host "Terminal active at: $env:TUNNEL_URL"
          $i = 0
          while ($i -lt 3000) { 
            Start-Sleep 1; $i++
            if ($i % 120 -eq 0) {
              Write-Host "[$([math]::Floor($i/60))m] alive url=$env:TUNNEL_URL"
            }
          }
